<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Game Pulse"/>
<title>GAME PULSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-page:#0a0a0f;
    --bg-panel:#111119;
    --bg-panel-hover:#161626;
    --bg-tabbar:#0d0d16;
    --bg-muted:#1c1c2c;
    --text-main:#e8e8f0;
    --text-soft:#6b6b85;
    --text-muted:#8b8ba3;
    --accent-green:#00ff88;
    --accent-cyan:#00ccff;
    --accent-blue:#0085ff;
    --accent-red:#ff5565;
    --accent-orange:#ff4500;
    --accent-deal:#ffd54a;
    --safe-top:env(safe-area-inset-top, 0px);
    --safe-right:env(safe-area-inset-right, 0px);
    --safe-bottom:env(safe-area-inset-bottom, 0px);
    --bottom-nav-gap:12px;
    --safe-left:env(safe-area-inset-left, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg-page); color: var(--text-main); font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-muted); border-radius: 99px; }
  a { color: inherit; text-decoration: none; }
  img { display:block; }

  @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shimmer  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.35} }
  @keyframes spin     { to{transform:rotate(360deg)} }
  @keyframes badgePop { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }

  /* ── Layout ── */
  .app        { background:var(--bg-page); height:100vh; height:100dvh; max-width:480px; margin:0 auto; display:flex; flex-direction:column; overflow:hidden; padding-bottom:calc(var(--safe-bottom) + var(--bottom-nav-gap)); }
  .header     { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 9px; border-bottom:1px solid var(--bg-muted); flex-shrink:0; }
  .logo       { font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:20px; letter-spacing:.08em; background:linear-gradient(120deg,var(--accent-green),var(--accent-cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .logo-sub   { font-size:10px; color:var(--text-soft); letter-spacing:.12em; font-family:'Chakra Petch',sans-serif; margin-top:1px; }
  .refresh-btn { display:flex; align-items:center; gap:6px; border:1px solid color-mix(in srgb, var(--accent-green) 35%, transparent); border-radius:10px; padding:7px 12px; color:var(--accent-green); font-size:11px; font-family:'Chakra Petch',sans-serif; letter-spacing:.05em; cursor:pointer; background:color-mix(in srgb, var(--accent-green) 7%, transparent); transition:all .15s; }
  .refresh-btn:disabled { color:var(--text-soft); border-color:var(--bg-muted); background:transparent; cursor:not-allowed; }
  .refresh-btn .icon { display:inline-block; }
  .refresh-btn.loading .icon { animation: spin 1s linear infinite; }
  .tab-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  /* ── Tab Bar ── */
  .tab-bar    { display:flex; background:var(--bg-tabbar); border-top:1px solid var(--bg-muted); flex-shrink:0; padding-bottom:calc(var(--safe-bottom) + var(--bottom-nav-gap)); }
  .tab-btn    { flex:1; background:none; border:none; cursor:pointer; padding:11px 8px 13px; display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--text-soft); transition:color .15s; position:relative; }
  .tab-btn.active { color:var(--accent-green); }
  .tab-btn.active::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:36px; height:2px; border-radius:0 0 3px 3px; background:linear-gradient(90deg,var(--accent-green),var(--accent-cyan)); }
  .tab-btn svg { width:21px; height:21px; }
  .tab-label  { display:block; width:100%; text-align:center; font-size:9px; line-height:1; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .tab-btn.active .tab-label { font-weight:700; }
  .tab-badge  { position:absolute; top:4px; right:calc(50% - 20px); min-width:16px; height:16px; border-radius:99px; background:linear-gradient(135deg,var(--accent-green),var(--accent-cyan)); color:#000; font-size:9px; font-weight:700; font-family:'Chakra Petch',sans-serif; display:flex; align-items:center; justify-content:center; padding:0 4px; animation:badgePop .3s ease both; }

  /* ── Search ── */
  .search-box { display:flex; align-items:center; background:var(--bg-panel); border:1px solid var(--bg-muted); border-radius:10px; padding:8px 12px; gap:8px; }
  .search-box input { background:none; border:none; outline:none; color:var(--text-main); font-size:14px; width:100%; font-family:'DM Sans',sans-serif; }
  .search-box input::placeholder { color:var(--text-soft); }
  .clear-btn  { background:none; border:none; cursor:pointer; color:var(--text-soft); padding:0; line-height:1; font-size:16px; }

  /* ── Pills ── */
  .pills      { display:flex; gap:7px; padding:7px 16px; overflow-x:auto; scrollbar-width:none; flex-shrink:0; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; overscroll-behavior-x:contain; }
  .pills::-webkit-scrollbar { display:none; }
  .pill       { flex-shrink:0; display:inline-flex; align-items:center; gap:7px; padding:5px 13px; border-radius:99px; font-size:11px; font-weight:700; font-family:'Chakra Petch',sans-serif; letter-spacing:.05em; cursor:pointer; transition:all .15s; border:1px solid var(--bg-muted); background:transparent; color:var(--text-soft); scroll-snap-align:start; }
  .pill.active { background:var(--pill-bg); border-color:var(--pill-col); color:var(--pill-col); }
  .pill-count { min-width:17px; height:17px; padding:0 5px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; background:var(--bg-muted); color:var(--text-main); font-size:10px; line-height:1; }
  .pill.active .pill-count { background:var(--pill-col); color:#08100d; }
  .feed-top { padding:8px 16px 0; flex-shrink:0; }
  .guide-panel { margin:10px 16px 0; padding:14px 14px 12px; border-radius:14px; border:1px solid #18363a; background:
    radial-gradient(circle at top right, rgba(0,204,255,.12), transparent 34%),
    linear-gradient(135deg, rgba(0,255,136,.08), rgba(0,204,255,.04) 55%, rgba(255,255,255,.02));
  }
  .guide-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .guide-title { font-size:11px; color:#e8fff5; font-family:'Chakra Petch',sans-serif; letter-spacing:.09em; }
  .guide-sub { font-size:11px; color:#90a5ab; line-height:1.45; margin-top:4px; }
  .guide-grid { display:flex; flex-wrap:wrap; gap:8px; }
  .guide-chip { display:inline-flex; align-items:center; padding:6px 9px; border-radius:999px; background:#0d1619; border:1px solid #1f3438; color:#c0d7db; font-size:10px; font-family:'Chakra Petch',sans-serif; letter-spacing:.04em; }
  .guide-dismiss { background:none; border:1px solid #284148; border-radius:999px; padding:5px 9px; color:#8fb0b6; font-size:10px; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; cursor:pointer; transition:border-color .15s,color .15s; }
  .guide-dismiss:hover { color:#e8fff5; border-color:#4b6d74; }
  .feed-toolbar { margin-top:7px; padding:0 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:28px; }
  .toolbar-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .filter-row-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:0 16px; margin-top:5px; min-height:14px; }
  .filter-row-head.compact { margin-top:0; }
  .filter-label { display:block; font-size:10px; line-height:1; color:var(--text-soft); font-family:'Chakra Petch',sans-serif; letter-spacing:.1em; text-transform:uppercase; }
  .filter-summary { min-height:28px; font-size:11px; line-height:1; color:var(--text-muted); font-family:'Chakra Petch',sans-serif; letter-spacing:.04em; display:flex; align-items:center; }
  .compact-btn { display:inline-flex; align-items:center; justify-content:center; min-height:28px; padding:7px 11px; border-radius:999px; border:1px solid var(--bg-muted); background:var(--bg-panel); color:var(--text-soft); font-size:10px; line-height:1; font-family:'Chakra Petch',sans-serif; letter-spacing:.07em; cursor:pointer; transition:all .15s; }
  .compact-btn:hover { border-color:var(--accent-green); color:var(--accent-green); }
  .compact-btn.active { border-color:var(--accent-cyan); color:var(--accent-cyan); background:color-mix(in srgb, var(--accent-cyan) 10%, transparent); }
  .compact-btn:disabled { opacity:.45; cursor:not-allowed; }
  .source-pills { padding-top:4px; }

  /* ── Status bar ── */
  .status-bar { padding:0 16px 5px; flex-shrink:0; display:flex; align-items:center; gap:6px; min-height:18px; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--accent-green); display:inline-block; animation:pulse 1s infinite; }
  .status-text { font-size:11px; line-height:1; color:var(--text-soft); font-family:'Chakra Petch',sans-serif; }
  .subtle-note { margin:0 16px 7px; padding:7px 10px; border-radius:10px; border:1px solid var(--bg-muted); background:var(--bg-panel); color:var(--text-muted); font-size:10px; line-height:1.4; }
  .subtle-note strong { color:var(--text-main); font-family:'Chakra Petch',sans-serif; font-weight:700; letter-spacing:.04em; }
  .resilience-banner { margin:0 16px 8px; padding:12px 12px 11px; border-radius:12px; border:1px solid #2b3144; background:linear-gradient(135deg,#131521,#10111a); }
  .resilience-banner.news { border-color:#21453b; background:linear-gradient(135deg,#101914,#11131a); }
  .resilience-banner.social { border-color:#203651; background:linear-gradient(135deg,#101520,#0f1219); }
  .resilience-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .resilience-title { font-size:11px; color:#eef6ff; font-family:'Chakra Petch',sans-serif; letter-spacing:.08em; }
  .resilience-copy { font-size:11px; color:#8e96ab; line-height:1.45; margin-top:4px; }
  .resilience-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .banner-btn { display:inline-flex; align-items:center; justify-content:center; padding:6px 10px; border-radius:999px; border:1px solid #2f3a52; background:#121624; color:#c8d4e5; font-size:10px; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; cursor:pointer; transition:border-color .15s, color .15s, background .15s; }
  .banner-btn:hover { color:#fff; border-color:#61718f; }
  .banner-btn.primary { border-color:#00ccff44; color:#9feeff; background:#00ccff12; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:6px 16px 6px; padding:10px 12px; border-radius:12px; background:var(--bg-panel); border:1px solid var(--bg-muted); }
  .toggle-copy { min-width:0; }
  .toggle-title { font-size:11px; color:#e8e8f0; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .toggle-sub { font-size:11px; color:#7f7f96; margin-top:3px; line-height:1.4; }
  .social-meta-bar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:4px 16px 5px; padding:7px 10px; border-radius:12px; background:var(--bg-panel); border:1px solid var(--bg-muted); }
  .social-meta-copy { min-width:0; }
  .social-meta-title { font-size:10px; line-height:1; color:#e8e8f0; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .social-meta-sub { display:flex; align-items:center; gap:6px; margin-top:3px; font-size:10px; line-height:1; color:#7f7f96; }
  .social-meta-sub .status-dot { width:6px; height:6px; animation:none; }
  .switch { width:48px; height:28px; border:none; border-radius:999px; background:#272738; padding:3px; cursor:pointer; transition:background .18s; flex-shrink:0; position:relative; }
  .switch.on { background:linear-gradient(135deg,#0085ff,#00ccff); }
  .switch-knob { width:22px; height:22px; border-radius:50%; background:#fff; transform:translateX(0); transition:transform .18s; box-shadow:0 2px 8px rgba(0,0,0,.22); }
  .switch.on .switch-knob { transform:translateX(20px); }

  /* ── Skeleton ── */
  .skeleton-card { background:#111119; border-radius:12px; padding:14px 16px; border-left:3px solid #1c1c2c; margin-bottom:8px; }
  .skel-line { border-radius:6px; background:linear-gradient(90deg,#111119 25%,#18182a 50%,#111119 75%); background-size:200% 100%; animation:shimmer 1.6s infinite; }

  /* ── News Card ── */
  .news-card  { position:relative; overflow:hidden; display:flex; gap:12px; border-radius:12px; padding:13px 16px; margin-bottom:8px; background:#111119; border-left:3px solid var(--card-col); transition:background .18s, transform .18s, box-shadow .18s; cursor:pointer; box-shadow:0 12px 30px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.015); }
  .news-card::before { content:""; position:absolute; inset:0; pointer-events:none; background:radial-gradient(circle at top right, rgba(255,255,255,.045), transparent 34%); opacity:.7; }
  .news-card:hover { background:#161626; transform:translateY(-1px); box-shadow:0 18px 34px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.03); }
  .news-card:hover .news-title { color:#fff; }
  .news-card.compact-card { gap:10px; padding:10px 12px; }
  .card-body  { flex:1; min-width:0; }
  .card-meta  { display:flex; align-items:center; gap:7px; margin-bottom:6px; flex-wrap:wrap; }
  .card-source { font-size:11px; font-weight:700; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; text-transform:uppercase; color:var(--card-col); }
  .card-time  { font-size:11px; line-height:1; color:#6b6b85; }
  .badge-breaking { display:inline-flex; align-items:center; gap:4px; padding:1px 7px; border-radius:4px; background:#ff4500; color:#fff; font-size:9px; font-weight:700; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .badge-breaking::before { content:""; width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.95; }
  .update-strip { padding:0 16px 5px; flex-shrink:0; min-height:18px; }
  .update-strip-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:3px; }
  .update-strip-label,
  .update-strip-timer { font-size:10px; line-height:1; color:#6b6b85; font-family:'Chakra Petch',sans-serif; }
  .update-strip-label { letter-spacing:.06em; }
  .update-strip-timer { letter-spacing:.04em; }
  .update-strip-bar { height:2px; background:#1c1c2c; border-radius:99px; overflow:hidden; }
  .platform-pills { padding-top:6px; margin-top:0; gap:6px; }
  .platform-pills .pill { padding:4px 10px; font-size:10px; border-color:#252538; color:#7d7d95; }
  .platform-pill.active { box-shadow:0 0 0 1px var(--pill-col) inset; }
  .platform-badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .platform-badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:999px; font-size:10px; font-weight:700; font-family:'Chakra Petch',sans-serif; letter-spacing:.05em; border:1px solid var(--badge-col); color:var(--badge-col); background:rgba(255,255,255,.06); }
  .deal-card { border-left-color:#ffd54a !important; box-shadow:0 0 0 1px #ffd54a22 inset; }
  .badge-deal { display:inline-flex; align-items:center; gap:4px; padding:1px 7px; border-radius:4px; background:#ffd54a; color:#18140a; font-size:9px; font-weight:700; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .deal-card.deal-soft { border-left-color:#f0c24f !important; box-shadow:0 0 0 1px #f0c24f18 inset; }
  .badge-deal.soft { background:#2a2415; color:#f5d77a; border:1px solid #5f4d1a; }
  .badge-deal.strong { background:#ffd54a; color:#18140a; }
  .news-title { font-size:14px; font-weight:500; line-height:1.48; color:#e8e8f0; transition:color .15s; }
  .news-card.read-card { background:#0f0f17; border-left-color:color-mix(in srgb, var(--card-col) 42%, #1c1c2c); box-shadow:0 8px 18px rgba(0,0,0,.1), inset 0 0 0 1px rgba(255,255,255,.02); }
  .news-card.read-card:hover { background:#141420; }
  .news-card.read-card .card-source { opacity:.72; }
  .news-card.read-card .card-time { color:#5f5f76; }
  .news-card.read-card .news-title { color:#9898ae; }
  .news-card.read-card .platform-badge { opacity:.62; }
  .news-card.read-card .card-thumb { opacity:.58; filter:saturate(.72) brightness(.88); }
  .news-card.read-card .bookmark-btn { color:#5f5f76; }
  .news-card.read-card .read-btn.read { border-color:#1f6c4a; color:#6ee7aa; background:#0d1b16; }
  .card-thumb { width:72px; height:72px; border-radius:8px; object-fit:cover; flex-shrink:0; background:#1c1c2c; align-self:center; }
  .news-card.compact-card .card-thumb { width:54px; height:54px; border-radius:7px; }
  .news-card.compact-card .card-meta { gap:6px; margin-bottom:4px; }
  .news-card.compact-card .news-title { font-size:13px; line-height:1.38; }
  .news-card.compact-card .card-actions { margin-top:6px; gap:6px; }
  .news-card.compact-card .platform-badges { gap:5px; margin-top:6px; }
  .card-actions { display:flex; align-items:center; margin-top:8px; gap:8px; flex-wrap:wrap; }
  .bookmark-btn { background:none; border:none; cursor:pointer; padding:2px 4px; color:#6b6b85; transition:color .15s; display:flex; align-items:center; gap:4px; font-size:11px; font-family:'Chakra Petch',sans-serif; }
  .bookmark-btn:hover { color:#00ff88; }
  .bookmark-btn.saved { color:#00ff88; }
  .read-btn { background:none; border:1px solid #2b2b3c; cursor:pointer; padding:4px 9px; border-radius:999px; color:#8f8fa7; transition:all .15s; display:flex; align-items:center; gap:4px; font-size:10px; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .read-btn:hover { border-color:var(--accent-cyan); color:var(--accent-cyan); }
  .read-btn.read { border-color:#00ff8850; color:var(--accent-green); background:#00ff8810; }

  /* ── Social Card (Bluesky) ── */
  .tweet-card { position:relative; overflow:hidden; border-radius:12px; padding:13px 16px; margin-bottom:8px; background:#111119; border-left:3px solid #0085ff; transition:background .18s, transform .18s, box-shadow .18s; cursor:pointer; box-shadow:0 12px 30px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.015); }
  .tweet-card::before { content:""; position:absolute; inset:0; pointer-events:none; background:radial-gradient(circle at top right, rgba(0,133,255,.08), transparent 34%); opacity:.7; }
  .tweet-card:hover { background:#161626; transform:translateY(-1px); box-shadow:0 18px 34px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.03); }
  .tweet-card.compact-card { padding:10px 12px; }
  .tweet-card.read-card { background:#0f0f17; border-left-color:#1f4f88; box-shadow:0 8px 18px rgba(0,0,0,.1), inset 0 0 0 1px rgba(255,255,255,.02); }
  .tweet-card.read-card:hover { background:#141420; }
  .tweet-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .tweet-avatar { width:32px; height:32px; border-radius:50%; background:#0085ff15; border:1px solid #0085ff33; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .tweet-avatar svg { width:16px; height:16px; fill:#0085ff; }
  .tweet-handle { font-size:13px; font-weight:600; color:#0085ff; font-family:'Chakra Petch',sans-serif; letter-spacing:.03em; }
  .tweet-time { font-size:11px; line-height:1; color:#6b6b85; margin-left:auto; flex-shrink:0; }
  .tweet-text { font-size:14px; line-height:1.52; color:#e8e8f0; transition:color .15s; }
  .tweet-card:hover .tweet-text { color:#fff; }
  .tweet-actions { display:flex; align-items:center; margin-top:8px; gap:12px; }
  .tweet-card.compact-card .tweet-head { margin-bottom:6px; gap:7px; }
  .tweet-card.compact-card .tweet-avatar { width:28px; height:28px; }
  .tweet-card.compact-card .tweet-avatar svg { width:14px; height:14px; }
  .tweet-card.compact-card .tweet-text { font-size:13px; line-height:1.42; }
  .tweet-card.compact-card .tweet-actions { margin-top:6px; gap:8px; }
  .tweet-card.read-card .tweet-handle { opacity:.78; }
  .tweet-card.read-card .tweet-time { color:#5f5f76; }
  .tweet-card.read-card .tweet-text { color:#9898ae; }
  .tweet-card.read-card .tweet-avatar { opacity:.72; }

  /* ── Link preview (Bluesky embeds) ── */
  .link-preview { display:flex; align-items:center; gap:10px; margin-top:8px; padding:8px 10px; border-radius:8px; border:1px solid #1c1c2c; background:#0d0d16; overflow:hidden; }
  .link-preview-thumb { width:44px; height:44px; border-radius:6px; object-fit:cover; flex-shrink:0; background:#1c1c2c; }
  .link-preview-body { min-width:0; flex:1; }
  .link-preview-title { font-size:12px; line-height:1.38; color:#c8c8d8; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .link-preview-domain { font-size:10px; color:#6b6b85; font-family:'Chakra Petch',sans-serif; letter-spacing:.04em; margin-top:3px; }

  /* ── Source section headers ── */
  .source-section-header { font-size:10px; color:#6b6b85; font-family:'Chakra Petch',sans-serif; letter-spacing:.1em; margin:16px 0 10px; padding-bottom:6px; border-bottom:1px solid #1c1c2c; display:flex; align-items:center; gap:8px; }
  .source-section-header:first-child { margin-top:0; }
  .source-section-header svg { width:14px; height:14px; flex-shrink:0; }

  /* ── Article list ── */
  .article-list { flex:1; overflow-y:auto; padding:0 16px calc(16px + var(--safe-bottom) + var(--bottom-nav-gap) + 12px); }

  /* ── Empty state ── */
  .empty      { text-align:center; padding:60px 20px; color:#6b6b85; }

  .empty-title { font-family:'Chakra Petch',sans-serif; font-size:14px; margin-bottom:6px; }
  .empty-sub  { font-size:12px; }

  /* ── X Accounts ── */
  .x-tab      { display:flex; flex-direction:column; flex:1; overflow:hidden; padding:16px 16px 0; }
  .add-box    { background:#111119; border:1px solid #1c1c2c; border-radius:14px; padding:16px; margin-bottom:16px; flex-shrink:0; }
  .add-label  { font-size:10px; color:#6b6b85; font-family:'Chakra Petch',sans-serif; letter-spacing:.1em; margin-bottom:12px; }
  .add-row    { display:flex; gap:8px; }
  .add-input  { flex:1; display:flex; align-items:center; background:#0a0a0f; border:1px solid #1c1c2c; border-radius:8px; padding:9px 12px; gap:5px; transition:border-color .15s; }
  .add-input.err { border-color:#ff5565; }
  .add-input span { color:#6b6b85; font-size:14px; font-family:'Chakra Petch',sans-serif; }
  .add-input input { background:none; border:none; outline:none; color:#e8e8f0; font-size:14px; width:100%; font-family:'DM Sans',sans-serif; }
  .add-input input::placeholder { color:#6b6b85; }
  .add-btn    { background:linear-gradient(135deg,#00ff88,#00ccff); border:none; border-radius:8px; padding:9px 18px; color:#000; font-size:13px; font-weight:700; font-family:'Chakra Petch',sans-serif; cursor:pointer; letter-spacing:.04em; }
  .add-error  { font-size:12px; color:#ff5565; margin-top:8px; }
  .x-list     { flex:1; overflow-y:auto; padding-bottom:calc(16px + var(--safe-bottom) + var(--bottom-nav-gap) + 12px); }
  .x-card     { display:flex; align-items:center; background:#111119; border:1px solid #1c1c2c; border-radius:12px; padding:13px 14px; margin-bottom:8px; transition:background .15s; }
  .x-card:hover { background:#161626; }
  .x-avatar   { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#00ff8828,#00ccff28); border:1px solid #1c1c2c; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-right:12px; color:#00ccff; font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:17px; }
  .x-info     { flex:1; }
  .x-handle   { font-size:14px; font-weight:600; color:#e8e8f0; }
  .x-desc     { font-size:12px; color:#6b6b85; margin-top:2px; }
  .x-remove   { background:none; border:none; cursor:pointer; color:#6b6b85; padding:5px 8px; font-size:18px; line-height:1; border-radius:6px; transition:color .15s, background .15s; }
  .x-remove:hover { color:#ff5565; background:#ff556518; }

  /* ── Sources Tab ── */
  .sources-tab { flex:1; overflow-y:auto; padding:16px 16px calc(16px + var(--safe-bottom) + var(--bottom-nav-gap) + 12px); }
  .sources-count { font-size:10px; color:#6b6b85; font-family:'Chakra Petch',sans-serif; letter-spacing:.1em; margin-bottom:14px; }
  .sources-hero { margin-bottom:14px; padding:16px; border-radius:16px; border:1px solid #1f2738; background:
    radial-gradient(circle at top left, rgba(0,255,136,.1), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0,204,255,.12), transparent 36%),
    linear-gradient(135deg, #12121c, #151626 58%, #101018); }
  .sources-hero-title { font-size:15px; color:#f2f8ff; font-family:'Chakra Petch',sans-serif; letter-spacing:.08em; margin-bottom:6px; }
  .sources-hero-copy { font-size:12px; color:#9aa3bb; line-height:1.6; max-width:42ch; }
  .sources-hero-stats { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .hero-stat { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:#111522; border:1px solid #232a3c; color:#8ea0b6; font-size:10px; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .hero-stat strong { color:#f4fbff; font-weight:700; }
  .sources-toolbar { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; }
  .source-health { display:flex; flex-wrap:wrap; gap:8px; }
  .health-chip { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; background:#111119; border:1px solid #1c1c2c; border-radius:999px; color:#8d8da8; font-size:10px; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .health-chip strong { color:#e8e8f0; font-weight:700; }
  .health-chip.warn strong { color:#ffd54a; }
  .health-chip.danger strong { color:#ff7785; }
  .source-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
  .source-action-btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:7px 11px; background:#111119; border:1px solid #1c1c2c; border-radius:999px; color:#a4a4bf; font-size:10px; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; cursor:pointer; transition:border-color .15s, color .15s, background .15s, transform .15s; }
  .source-action-btn:hover { color:#e8e8f0; border-color:#6b6b85; transform:translateY(-1px); }
  .source-action-btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }
  .source-action-btn.warn { border-color:#ffd54a33; color:#ffd54a; background:#ffd54a12; }
  .source-action-btn.danger { border-color:#ff556533; color:#ff7785; background:#ff556512; }
  .source-card { display:flex; align-items:center; background:#111119; border-radius:12px; padding:13px 16px; margin-bottom:8px; border-left:3px solid var(--src-col); transition:background .15s; cursor:pointer; }
  .source-card:hover { background:#161626; }
  .source-name { font-family:'Chakra Petch',sans-serif; font-size:14px; font-weight:600; color:#e8e8f0; }
  .source-url  { font-size:11px; color:#6b6b85; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .source-status { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .source-label { font-size:10px; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .source-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .about-feeds { margin-top:16px; background:#111119; border:1px solid #1c1c2c; border-radius:12px; padding:14px 16px; }
  .about-title { font-size:10px; font-family:'Chakra Petch',sans-serif; letter-spacing:.08em; color:#6b6b85; margin-bottom:6px; }
  .about-text  { font-size:12px; color:#6b6b85; line-height:1.65; }
  .settings-status { margin:0 0 14px; padding:10px 12px; border-radius:10px; border:1px solid #1c1c2c; background:#101018; color:#7f7f96; font-size:11px; line-height:1.5; }
  .settings-status strong { color:#e8e8f0; font-family:'Chakra Petch',sans-serif; font-weight:700; letter-spacing:.04em; }
  .source-controls { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .source-tool-stack { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; flex-shrink:0; min-width:40px; }
  .source-tool-label { font-size:8px; line-height:1; color:#6b6b85; font-family:'Chakra Petch',sans-serif; letter-spacing:.1em; text-transform:uppercase; }
  .source-mini-label { width:100%; font-size:9px; color:#6b6b85; font-family:'Chakra Petch',sans-serif; letter-spacing:.1em; margin-top:4px; }
  .source-mode-row { display:flex; gap:6px; flex-wrap:wrap; width:100%; }
  .source-mode-btn { background:#111119; border:1px solid #252538; border-radius:999px; padding:4px 9px; color:#8e8ea8; font-size:9px; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; cursor:pointer; transition:border-color .15s, color .15s, background .15s; }
  .source-mode-btn:hover { color:#e8e8f0; border-color:#6b6b85; }
  .source-mode-btn.active { border-color:#00ccff66; color:#00ccff; background:#00ccff12; }

  /* ── Color Picker ── */
  .color-btn   { width:28px; height:28px; border-radius:50%; border:2px solid #1c1c2c; cursor:pointer; flex-shrink:0; transition:border-color .15s, transform .15s; display:flex; align-items:center; justify-content:center; }
  .color-btn:hover { transform:scale(1.1); }
  .notify-btn  { width:28px; height:28px; border-radius:50%; border:1px solid #1c1c2c; cursor:pointer; flex-shrink:0; transition:border-color .15s, transform .15s, color .15s, background .15s; display:flex; align-items:center; justify-content:center; background:#111119; color:#6b6b85; }
  .notify-btn:hover { transform:scale(1.08); border-color:#6b6b85; color:#e8e8f0; }
  .notify-btn.enabled { color:#ffd54a; border-color:#ffd54a66; background:#ffd54a14; }
  .notify-btn svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .color-palette { display:none; gap:6px; flex-wrap:wrap; padding:10px 12px; background:#0d0d16; border:1px solid #1c1c2c; border-radius:10px; margin-top:6px; margin-bottom:4px; }
  .color-palette.open { display:flex; }
  .swatch      { width:26px; height:26px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:transform .12s, border-color .12s; }
  .swatch:hover { transform:scale(1.15); }
  .swatch.active { border-color:#fff; }
  .reset-color { background:none; border:1px solid #1c1c2c; border-radius:6px; padding:3px 10px; color:#6b6b85; font-size:10px; font-family:'Chakra Petch',sans-serif; cursor:pointer; letter-spacing:.06em; transition:color .15s, border-color .15s; margin-left:auto; }
  .reset-color:hover { color:#e8e8f0; border-color:#6b6b85; }

  /* ── Top Stories ── */
  .top-stories-header { display:flex; align-items:center; gap:8px; padding:0 0 8px; margin:0 0 8px; border-bottom:1px solid #1c1c2c; font-size:10px; color:#6b6b85; font-family:'Chakra Petch',sans-serif; letter-spacing:.1em; }
  .top-stories-header svg { flex-shrink:0; }
  .top-story-card { position:relative; overflow:hidden; border-radius:12px; padding:13px 16px; margin-bottom:8px; background:linear-gradient(135deg, rgba(0,255,136,.06), rgba(0,204,255,.04) 55%, #111119); border-left:3px solid var(--accent-green); transition:background .18s, transform .18s; cursor:pointer; box-shadow:0 12px 30px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.015); }
  .top-story-card:hover { transform:translateY(-1px); }
  .top-story-card .news-title { font-size:15px; }
  .badge-coverage { display:inline-flex; align-items:center; gap:4px; padding:1px 7px; border-radius:4px; background:linear-gradient(135deg,var(--accent-green),var(--accent-cyan)); color:#0a0a0f; font-size:9px; font-weight:700; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .section-divider { display:flex; align-items:center; gap:8px; padding:10px 0 6px; font-size:10px; color:#6b6b85; font-family:'Chakra Petch',sans-serif; letter-spacing:.1em; }
  .section-divider::after { content:''; flex:1; height:1px; background:#1c1c2c; }

  /* ── New badge ── */
  .badge-new { display:inline-flex; align-items:center; padding:1px 6px; border-radius:4px; background:#00ccff; color:#0a0a0f; font-size:9px; font-weight:700; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }

  /* ── Pinned Topics ── */
  .badge-pinned { display:inline-flex; align-items:center; gap:3px; padding:1px 6px; border-radius:4px; background:#ab47bc22; border:1px solid #ab47bc66; color:#ce93d8; font-size:9px; font-weight:700; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; }
  .pin-topic-tag { display:inline-flex; align-items:center; gap:5px; padding:4px 9px; border-radius:999px; background:#1a0e1c; border:1px solid #ab47bc44; color:#ce93d8; font-size:11px; font-family:'Chakra Petch',sans-serif; cursor:pointer; transition:all .15s; }
  .pin-topic-tag .pin-remove { color:#ab47bc; font-size:13px; line-height:1; }

  /* ── Pull to refresh ── */
  .ptr-indicator { display:flex; align-items:center; justify-content:center; height:0; overflow:hidden; transition:height .2s ease; flex-shrink:0; }
  .ptr-spinner { width:22px; height:22px; border:2.5px solid #1c1c2c; border-top-color:#00ff88; border-radius:50%; }
  .ptr-spinner.spinning { animation: spin .6s linear infinite; }
  .ptr-text { font-size:11px; color:#6b6b85; font-family:'Chakra Petch',sans-serif; letter-spacing:.06em; margin-left:8px; }

  /* ── Scroll to top ── */
  .scroll-top-btn { position:fixed; bottom:calc(80px + var(--safe-bottom) + var(--bottom-nav-gap)); right:max(calc(16px + var(--safe-right)), calc((100vw - 480px)/2 + 16px)); width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#00ff88,#00ccff); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px #00ff8844; opacity:0; pointer-events:none; transform:translateY(12px); transition:opacity .25s, transform .25s; z-index:10; }
  .scroll-top-btn.visible { opacity:1; pointer-events:auto; transform:translateY(0); }
  .scroll-top-btn svg { width:18px; height:18px; stroke:#000; stroke-width:2.5; fill:none; }

  /* ── Animations ── */
  .fade-up { animation: fadeUp .3s ease both; }

  @media (max-width: 430px) {
    :root { --bottom-nav-gap:10px; }
    .header { padding:10px 12px 8px; }
    .logo { font-size:18px; letter-spacing:.07em; }
    .logo-sub { font-size:9px; letter-spacing:.11em; }
    .refresh-btn { padding:6px 10px; font-size:10px; }
    .refresh-btn .label { white-space:nowrap; }
    .pills { gap:6px; padding:6px 12px; scroll-padding-inline:12px; scroll-snap-type:x mandatory; }
    .pill { padding:5px 11px; font-size:10px; }
    .pill-count { min-width:16px; height:16px; font-size:9px; }
    .search-box { padding:7px 10px; gap:7px; }
    .search-box input { font-size:13px; }
    .feed-top { padding:7px 12px 0; }
    .guide-panel { margin:8px 12px 0; padding:12px 12px 10px; }
    .feed-toolbar { margin-top:6px; padding:0 12px; }
    .resilience-banner { margin:0 12px 9px; }
    .toolbar-actions { gap:5px; }
    .filter-row-head { padding:0 12px; margin-top:4px; }
    .compact-btn { padding:6px 10px; font-size:9px; }
    .status-bar { padding:0 12px 4px; }
    .subtle-note { margin:0 12px 6px; padding:6px 9px; }
    .update-strip { padding:0 12px 4px; }
    .social-meta-bar { margin:4px 12px 5px; padding:6px 9px; }
    .toggle-row { margin:8px 12px 7px; padding:9px 10px; }
    .article-list { padding-left:12px; padding-right:12px; }
    .news-card { gap:10px; padding:12px 13px; border-radius:11px; }
    .tweet-card { padding:12px 13px; border-radius:11px; }
    .card-meta { gap:6px; margin-bottom:5px; }
    .news-title { font-size:13px; line-height:1.42; }
    .tweet-text { font-size:13px; line-height:1.46; }
    .card-thumb { width:64px; height:64px; border-radius:7px; }
    .bookmark-btn { font-size:10px; gap:3px; }
    .sources-tab { padding-left:12px; padding-right:12px; }
    .sources-hero { padding:14px 12px; border-radius:14px; }
    .sources-toolbar { flex-direction:column; align-items:stretch; }
    .source-actions { justify-content:flex-start; }
    .source-action-btn { flex:1; min-width:0; }
    .scroll-top-btn { width:38px; height:38px; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <div>
      <div class="logo">GAME PULSE</div>
      <div class="logo-sub">GAMING NEWS FEED</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAllFeeds()">
      <span class="icon">↻</span>
      <span class="label">Refresh</span>
    </button>
  </div>
  <div class="tab-content" id="tabContent"></div>
  <!-- Scroll to top button -->
  <button class="scroll-top-btn" id="scrollTopBtn" onclick="scrollToTop()">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

    <button class="tab-btn active" data-tab="feed" onclick="switchTab('feed')">

        <path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor" stroke="none"/>
      </svg>

      </svg>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span class="tab-label">SOURCES</span>
    </button>
  </div>
</div>

<script>

const SOURCES = [
  /* ── News Sources ── */

/* ═══════════════════════════════════════════════════════════════
   STORAGE — works with localStorage (browser) AND window.storage (artifact)
   window.storage uses async get/set, so we read on init then write fire-and-forget
═══════════════════════════════════════════════════════════════ */
function hasArtifactStorage() {
  try { return typeof window !== "undefined" && window.storage && typeof window.storage.get === "function"; } catch { return false; }
}

function storageGet(key) {
  // Returns a Promise that resolves to the value (string or null)
  if (hasArtifactStorage()) {
    return Promise.resolve(window.storage.get(key)).then(v => v?.value ?? v ?? null).catch(() => null);
  }
  try { return Promise.resolve(localStorage.getItem(key)); } catch { return Promise.resolve(null); }
}

function storageSet(key, value) {
  if (hasArtifactStorage()) {
    try { Promise.resolve(window.storage.set(key, value)).catch(() => {}); } catch {}
  }
  try { localStorage.setItem(key, value); } catch {}
}

async function loadRemovedDefaultXHandles() {
  try {
    const s = await storageGet("gamepulse_removed_default_x_handles");
    if (s) removedDefaultXHandles = JSON.parse(s);
  } catch {}
}
function saveRemovedDefaultXHandles() {
  storageSet("gamepulse_removed_default_x_handles", JSON.stringify(removedDefaultXHandles));
}

async function loadXAccounts() {
  try {
    const s = await storageGet("gamepulse_xAccounts");
    if (s) {
      const stored = JSON.parse(s);
      xAccounts = normalizeXAccounts(stored || [], removedDefaultXHandles);
      if (JSON.stringify(stored || []) !== JSON.stringify(xAccounts)) saveXAccounts();
      return;
    }
  } catch {}
  xAccounts = normalizeXAccounts(DEFAULT_X_ACCOUNTS, removedDefaultXHandles);
}

function articleMatchesPinnedTopics(a) {
  if (!pinnedTopics.length) return false;
  const text = (a.title + " " + (a.source || "")).toLowerCase();
  return pinnedTopics.some(kw => text.includes(kw.toLowerCase()));
}
function isQuietHour() {
  if (!quietHours.enabled) return false;
  const h = new Date().getHours();
  const { start, end } = quietHours;
  return start <= end ? (h >= start && h < end) : (h >= start || h < end);
}
function isNewArticle(a, tab) {
  const ts = tab === "social" ? lastVisitedSocial : lastVisitedFeed;
  if (!ts) return false;
  const pub = a.pubDate instanceof Date ? a.pubDate.getTime() : new Date(a.pubDate).getTime();
  return pub > ts;
}

    socialVisitTimer = setTimeout(() => { lastVisitedSocial = Date.now(); saveLastVisitedSocial(); render(); }, 5000);
  }
}

function resolveLegacyBlueskyHandle(handle = "") {
  const raw = (handle || "").trim().replace(/^@/, "");
  if (!raw) return "";
  if (raw.includes(".")) return raw.toLowerCase();

  const normalized = raw.toLowerCase().replace(/[^a-z0-9]+/g, "");
  const builtin = BUILTIN_SOCIAL_SOURCES.find(source => {
    const sourceHandle = (source.handle || "").toLowerCase();
    const sourceName = (source.name || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
    const sourceId = (source.id || "").toLowerCase().replace(/^bsky-/, "").replace(/[^a-z0-9]+/g, "");
    const handleBase = sourceHandle.split(".")[0].replace(/[^a-z0-9]+/g, "");
    return normalized === sourceName || normalized === sourceId || normalized === handleBase;
  });
  return builtin?.handle?.toLowerCase() || raw.toLowerCase();
}

function normalizeXAccounts(accounts = [], removedHandles = []) {
  const migrated = (accounts || []).map(account => {
    const resolvedHandle = resolveLegacyBlueskyHandle(account?.handle || "");
    if (resolvedHandle === "tomwarren.social") {
      return { ...account, handle: "tomwarren.co.uk" };
    }
    return { ...account, handle: resolvedHandle };
  });
  const removed = new Set((removedHandles || []).map(handle => resolveLegacyBlueskyHandle(handle)).filter(Boolean));
  const merged = [...migrated];
  const seen = new Set(migrated.map(account => (account?.handle || "").toLowerCase()).filter(Boolean));
  DEFAULT_X_ACCOUNTS.forEach(account => {
    const handle = resolveLegacyBlueskyHandle(account?.handle || "");
    if (!handle || removed.has(handle) || seen.has(handle)) return;
    merged.push({ ...account, handle });
    seen.add(handle);
  });
  return merged.filter((account, index, arr) =>
    account?.handle && arr.findIndex(other => (other.handle || "").toLowerCase() === (account.handle || "").toLowerCase()) === index
  );
}

function isBuiltInXHandle(handle = "") {
  const resolved = resolveLegacyBlueskyHandle(handle);
  return DEFAULT_X_ACCOUNTS.some(account => resolveLegacyBlueskyHandle(account.handle) === resolved);
}

function createCustomSocialId(handle = "") {
  return "bsky-custom-" + handle.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
}

function formatCustomSocialName(handle = "") {
  const base = handle.split(".")[0] || handle;
  return base
    .replace(/[-_]+/g, " ")
    .replace(/\b\w/g, char => char.toUpperCase());
}

function getSocialSources() {
  const builtInsByHandle = new Map(BUILTIN_SOCIAL_SOURCES.map(source => [(source.handle || "").toLowerCase(), source]));
  return xAccounts.map(account => {
    const handle = (account?.handle || "").toLowerCase();
    const builtIn = builtInsByHandle.get(handle);
    if (builtIn) {
      return {
        ...builtIn,
        desc: account?.description || builtIn.desc || ""
      };
    }
    return {
      id: createCustomSocialId(handle),
      name: formatCustomSocialName(handle),
      color: "#0085ff",
      url: `https://bsky.app/profile/${handle}/rss`,
      site: `https://bsky.app/profile/${handle}`,
      type: "social",
      handle,
      desc: account?.description || ""
    };
  });
}

function getAllSources() {
  return [...NEWS_SOURCES, ...getSocialSources()];
}

  removedDefaultXHandles = Array.isArray(data.removedDefaultXHandles) ? data.removedDefaultXHandles.map(resolveLegacyBlueskyHandle).filter(Boolean) : [];
  xAccounts = normalizeXAccounts(xAccounts, removedDefaultXHandles);
  customColors = data.customColors && typeof data.customColors === "object" ? data.customColors : {};
  notificationPrefs = data.notificationPrefs && typeof data.notificationPrefs === "object" ? data.notificationPrefs : {};
  dealSourcePrefs = data.dealSourcePrefs && typeof data.dealSourcePrefs === "object" ? data.dealSourcePrefs : {};
  bookmarks = data.bookmarks && typeof data.bookmarks === "object" ? data.bookmarks : {};
  readArticles = data.readArticles && typeof data.readArticles === "object" ? data.readArticles : {};
  hideRead = !!data.feedPrefs?.hideRead;
  socialGamingOnly = data.socialPrefs?.gamingOnly !== false;
  hideSocialRead = !!data.socialPrefs?.hideRead;
  compactMode = !!data.uiPrefs?.compactMode;
  if (typeof data.uiPrefs?.showPlatformPills === "boolean") showPlatformPills = data.uiPrefs.showPlatformPills;
  helpPrefs = { dismissed: !!data.helpPrefs?.dismissed };
  if (data.quietHours && typeof data.quietHours === "object") quietHours = { ...quietHours, ...data.quietHours };
  if (Array.isArray(data.pinnedTopics)) pinnedTopics = data.pinnedTopics;

  saveXAccounts();
  saveRemovedDefaultXHandles();
  saveCustomColors();
  saveNotificationPrefs();
  saveDealSourcePrefs();
  saveBookmarks();
  saveReadArticles();
  saveFeedPrefs();
  saveSocialPrefs();
  saveUiPrefs();
  saveQuietHours();
  savePinnedTopics();
  setSettingsStatus("imported", "Settings restored from backup.");
  render();
  return true;
}
function toggleBookmark(article) {

  else { bookmarks[article.id] = { ...article, pubDate: article.pubDate.toISOString ? article.pubDate.toISOString() : article.pubDate, savedAt: Date.now() }; }
  // Haptic feedback on mobile (if supported)
  try { if (navigator.vibrate) navigator.vibrate(wasBookmarked ? 20 : [15, 30, 15]); } catch {}
  saveBookmarks();
  render();
}

/* ═══════════════════════════════════════════════════════════════
   RSS FETCHING
═══════════════════════════════════════════════════════════════ */
function withTimeout(promise, ms) {
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error("timeout")), ms);
    promise.then(v => { clearTimeout(t); resolve(v); }, e => { clearTimeout(t); reject(e); });
  });
}

function xmlElementsByName(root, name) {
  if (!root || !name) return [];
  return Array.from(root.getElementsByTagName("*")).filter(el => {
    const local = (el.localName || el.nodeName || "").toLowerCase();
    return local === name.toLowerCase();
  });
}

function xmlFirstByName(root, name) {
  return xmlElementsByName(root, name)[0] || null;
}

function xmlText(root, name) {
  return (xmlFirstByName(root, name)?.textContent || "").trim();
}

function xmlAttr(root, name, attr) {
  const el = xmlFirstByName(root, name);
  return el ? (el.getAttribute(attr) || "").trim() : "";
}

function xmlBestLink(root) {
  const links = xmlElementsByName(root, "link");
  const preferred = links.find(el => {
    const rel = (el.getAttribute("rel") || "").toLowerCase();
    return rel === "alternate" && el.getAttribute("href");
  });
  const fallback = links.find(el => el.getAttribute("href")) || links[0];
  if (!preferred && !fallback) return "";
  return preferred?.getAttribute("href") ||
         fallback?.getAttribute("href") ||
         (fallback?.textContent || "").trim() ||
         "";
}

/* Strategy 1: rss2json.com */
function mapRss2JsonItems(items, source, sourceType = source.type) {
  return items.map(item => ({
    id: item.link || item.guid || source.id + "-" + Math.random(),
    title: (item.title || "").trim(),
    link: item.link || "",
    thumbnail: item.thumbnail || item.enclosure?.link || "",
    pubDate: item.pubDate ? new Date(item.pubDate) : new Date(0),
    source: source.name,
    sourceId: source.id,
    color: source.color,
    sourceType
  })).filter(a => a.title && a.link);
}

async function tryRss2JsonUrl(feedUrl, source, sourceType = source.type) {
  try {
    const res = await withTimeout(fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`), 10000);
    if (!res.ok) return null;
    const data = await res.json();
    if (data.status !== "ok" || !data.items?.length) return null;
    return mapRss2JsonItems(data.items, source, sourceType);
  } catch { return null; }
}

async function tryRss2Json(source) {
  return tryRss2JsonUrl(source.url, source, source.type);
}

/* Strategy 2: XML proxies */
function extractThumb(item) {
  // Try media:content, media:thumbnail, enclosure, then image
  const mediaContent = xmlElementsByName(item, "content").find(el => el.getAttribute("url"));
  const mediaThumb = xmlElementsByName(item, "thumbnail").find(el => el.getAttribute("url"));
  const mc = mediaContent || mediaThumb;
  if (mc) return mc.getAttribute("url") || "";
  const enc = xmlElementsByName(item, "enclosure").find(el => el.getAttribute("url"));
  if (enc && (enc.getAttribute("type") || "").startsWith("image")) return enc.getAttribute("url") || "";
  // Try description for <img> tag
  const desc = xmlText(item, "description");
  const imgMatch = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
  if (imgMatch) return imgMatch[1];
  return "";
}

function parseXmlFeed(xmlText, source) {
  if (!xmlText || typeof xmlText !== "string") return null;
  const doc = new DOMParser().parseFromString(xmlText, "application/xml");
  if (doc.querySelector("parsererror")) return null;
  const items = [
    ...xmlElementsByName(doc, "item"),
    ...xmlElementsByName(doc, "entry")
  ];
  if (!items.length) return null;
  return items.map(item => {
    const title = xmlText(item, "title");
    let link = xmlBestLink(item);
    if (!link) link = xmlText(item, "guid");
    const rawDate = xmlText(item, "pubDate") ||
                    xmlText(item, "published") ||
                    xmlText(item, "updated") || "";
    return {
      id: link || source.id + "-" + Math.random(),
      title, link,
      thumbnail: extractThumb(item),
      pubDate: rawDate ? new Date(rawDate) : new Date(0),
      source: source.name, sourceId: source.id, color: source.color
    };
  }).filter(a => a.title && a.link);
}

function parseSocialFeed(xmlText, source) {
  if (!xmlText || typeof xmlText !== "string") return null;
  const doc = new DOMParser().parseFromString(xmlText, "application/xml");
  const entries = doc.querySelector("parsererror") ? [] : xmlElementsByName(doc, "entry");

  const parsedEntries = entries.map(entry => {
    const title = xmlText(entry, "title") ||
      xmlText(entry, "content") ||
      xmlText(entry, "summary");
    const link = xmlBestLink(entry) || xmlText(entry, "id");
    const rawDate = xmlText(entry, "published") ||
                    xmlText(entry, "updated") ||
                    xmlText(entry, "pubDate") || "";

    return {
      id: link || source.id + "-" + Math.random(),
      title: title.trim(),
      link,
      thumbnail: "",
      pubDate: rawDate ? new Date(rawDate) : new Date(0),
      source: source.name,
      sourceId: source.id,
      color: source.color
    };
  }).filter(item => item.title && item.link);

  if (parsedEntries.length) return parsedEntries;

  const entryBlocks = xmlText.match(/<entry\b[\s\S]*?<\/entry>/gi) || [];
  const fallbackItems = entryBlocks.map(block => {
    const title = decodeHtmlEntities(
      (block.match(/<title[^>]*>([\s\S]*?)<\/title>/i)?.[1] || "")
      .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1")
      .replace(/<[^>]+>/g, " ")
      .trim()
    ) || decodeHtmlEntities(
      (block.match(/<content[^>]*>([\s\S]*?)<\/content>/i)?.[1] || block.match(/<summary[^>]*>([\s\S]*?)<\/summary>/i)?.[1] || "")
      .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1")
      .replace(/<[^>]+>/g, " ")
      .trim()
    );
    const link = block.match(/<link[^>]+href="([^"]+)"/i)?.[1] ||
                 block.match(/<id[^>]*>([\s\S]*?)<\/id>/i)?.[1]?.trim() ||
                 "";
    const rawDate = block.match(/<published[^>]*>([\s\S]*?)<\/published>/i)?.[1]?.trim() ||
                    block.match(/<updated[^>]*>([\s\S]*?)<\/updated>/i)?.[1]?.trim() ||
                    "";

    return {
      id: link || source.id + "-" + Math.random(),
      title,
      link,
      thumbnail: "",
      pubDate: rawDate ? new Date(rawDate) : new Date(0),
      source: source.name,
      sourceId: source.id,
      color: source.color
    };
  }).filter(item => item.title && item.link);

  return fallbackItems.length ? fallbackItems : null;
}

async function tryXmlProxies(source) {
  const proxies = [
    { buildUrl: u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, parse: async r => { const d = await r.json(); return d.contents; } },
    { buildUrl: u => `https://corsproxy.io/?${encodeURIComponent(u)}`, parse: r => r.text() },
    { buildUrl: u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, parse: r => r.text() },
  ];
  for (const proxy of proxies) {
    try {
      const res = await withTimeout(fetch(proxy.buildUrl(source.url)), 10000);
      if (!res.ok) continue;
      const xmlText = await proxy.parse(res);
      const result = source.type === "social"
        ? parseSocialFeed(xmlText, source)
        : parseXmlFeed(xmlText, source);
      if (result && result.length) return result;
    } catch { continue; }
  }
  return null;
}

async function fetchFeed(source) {
  if (source.type === "social") {
    const apiResult = await fetchBlueskyAuthorFeed(source);
    if (apiResult && apiResult.length) return apiResult;
    const xmlResult = await tryXmlProxies(source);
    if (xmlResult && xmlResult.length) return xmlResult;
    return await tryRss2Json(source);
  }
  const result = await tryRss2Json(source);
  if (result && result.length) return result;
  return await tryXmlProxies(source);
}

async function fetchBlueskyAuthorFeed(source) {
  try {
    const actor = source.handle || "";
    if (!actor) return null;
    const url = `https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${encodeURIComponent(actor)}&limit=25`;
    const res = await withTimeout(fetch(url), 10000);
    if (!res.ok) return null;
    const data = await res.json();
    if (!Array.isArray(data.feed) || !data.feed.length) return null;

    return data.feed.map(entry => {
      const post = entry.post || {};
      const record = post.record || {};
      const text = typeof record.text === "string" ? record.text.trim() : "";
      const createdAt = record.createdAt || post.indexedAt || "";
      const uri = typeof post.uri === "string" ? post.uri : "";
      const postId = uri.split("/").pop() || "";
      const authorHandle = post.author?.handle || actor;
      const link = postId ? `https://bsky.app/profile/${authorHandle}/post/${postId}` : source.site;

      // Extract link card embed (external preview)
      const embed = post.embed || {};
      const externalEmbed = embed.external || (embed.$type === "app.bsky.embed.external#view" ? embed.external : null);
      const externalTitle = externalEmbed?.title || "";
      const externalUrl   = externalEmbed?.uri   || "";
      const externalThumb = externalEmbed?.thumb  || "";

      return {
        id: uri || link || source.id + "-" + Math.random(),
        title: text,
        link,
        thumbnail: "",
        pubDate: createdAt ? new Date(createdAt) : new Date(0),
        source: source.name,
        sourceId: source.id,
        color: source.color,
        handle: authorHandle,
        externalTitle,
        externalUrl,
        externalThumb
      };
    }).filter(item => item.title && item.link);
  } catch {
    return null;
  }
}

async function loadAllFeeds() {
  if (isLoading) return;
  isLoading = true;
  retryingSources = new Set();
  const allSources = getAllSources();
  const oldArticles = [...articles];
  const oldSocial   = [...socialArticles];
  const oldNewsIds  = new Set(oldArticles.map(a => a.id));
  const oldSocIds   = new Set(oldSocial.map(a => a.id));
  let freshNews   = [];
  let freshSocial = [];
  loadedSources = new Set();
  failedSources = new Set();
  loadedCount = 0;
  feedRenderLimit = INITIAL_RENDER_COUNT;
  socialRenderLimit = INITIAL_RENDER_COUNT;
  updateRefreshBtn();
  render();

  await Promise.allSettled(allSources.map(async source => {
    const items = await fetchFeed(source);
    if (items && items.length > 0) {
      loadedSources.add(source.id);
      // Add source type info to each item
      items.forEach(item => { item.sourceType = source.type; item.handle = source.handle || ""; });
      if (source.type === "social") {
        const seen = new Set(freshSocial.map(a => a.id));
        for (const item of items) { if (!seen.has(item.id)) { freshSocial.push(item); seen.add(item.id); } }
        freshSocial.sort((a, b) => b.pubDate - a.pubDate);
        socialArticles = freshSocial;
      } else {
        const seen = new Set(freshNews.map(a => a.id));
        for (const item of items) { if (!seen.has(item.id)) { freshNews.push(item); seen.add(item.id); } }
        freshNews.sort((a, b) => b.pubDate - a.pubDate);
        articles = freshNews;
      }
    } else {
      failedSources.add(source.id);
    }
    loadedCount++;
    debouncedRender();
  }));

  // Keep old articles if nothing loaded
  if (freshNews.length === 0 && oldArticles.length > 0) articles = oldArticles;
  else articles = freshNews;
  if (freshSocial.length === 0 && oldSocial.length > 0) socialArticles = oldSocial;
  else socialArticles = freshSocial;

  isLoading = false;
  lastUpdated = new Date();

  // Track new articles for Feed badge
  if (oldNewsIds.size > 0 && activeTab !== "feed") {
    const brandNew = articles.filter(a => !oldNewsIds.has(a.id)).length;
    if (brandNew > 0) newCount += brandNew;
  } else if (activeTab === "feed") { newCount = 0; }

  // Track new posts for Social badge
  if (oldSocIds.size > 0 && activeTab !== "social") {
    const brandNew = socialArticles.filter(a => !oldSocIds.has(a.id)).length;
    if (brandNew > 0) newSocialCount += brandNew;
  } else if (activeTab === "social") { newSocialCount = 0; }

  const alertCandidates = [
    ...articles.filter(a => !oldNewsIds.has(a.id) && shouldNotifyForItem(a)),
    ...socialArticles.filter(a => !oldSocIds.has(a.id) && shouldNotifyForItem(a))
  ].sort((a, b) => {
    const aDate = a.pubDate instanceof Date ? a.pubDate : new Date(a.pubDate || 0);
    const bDate = b.pubDate instanceof Date ? b.pubDate : new Date(b.pubDate || 0);
    return bDate - aDate;
  });

  sendDesktopNotifications(alertCandidates);

  prevArticleCount = articles.length;

  updateRefreshBtn();
  render();
  updateTabBadges();
  startAutoRefresh();
}

async function retryFailedFeeds() {
  if (isLoading) return;
  const retrySourcesList = getAllSources().filter(source => failedSources.has(source.id));
  if (!retrySourcesList.length) return;

  isLoading = true;
  retryingSources = new Set(retrySourcesList.map(source => source.id));
  loadedCount = 0;
  const oldArticles = [...articles];
  const oldSocial = [...socialArticles];
  const oldNewsIds = new Set(oldArticles.map(a => a.id));
  const oldSocIds = new Set(oldSocial.map(a => a.id));
  updateRefreshBtn();
  render();

  const nextLoaded = new Set(loadedSources);
  const nextFailed = new Set(failedSources);
  let nextArticles = [...articles];
  let nextSocial = [...socialArticles];

  await Promise.allSettled(retrySourcesList.map(async source => {
    const items = await fetchFeed(source);
    if (items && items.length > 0) {
      const normalizedItems = items.map(item => ({
        ...item,
        sourceType: source.type,
        handle: item.handle || source.handle || ""
      }));
      nextLoaded.add(source.id);
      nextFailed.delete(source.id);
      if (source.type === "social") nextSocial = mergeSourceItems(nextSocial, normalizedItems, source);
      else nextArticles = mergeSourceItems(nextArticles, normalizedItems, source);
    } else {
      nextFailed.add(source.id);
    }
    loadedCount++;
    debouncedRender();
  }));

  articles = nextArticles;
  socialArticles = nextSocial;
  loadedSources = nextLoaded;
  failedSources = nextFailed;
  retryingSources = new Set();
  isLoading = false;
  lastUpdated = new Date();

  if (oldNewsIds.size > 0 && activeTab !== "feed") {
    const brandNew = articles.filter(a => !oldNewsIds.has(a.id)).length;
    if (brandNew > 0) newCount += brandNew;
  } else if (activeTab === "feed") {
    newCount = 0;
  }

  if (oldSocIds.size > 0 && activeTab !== "social") {
    const brandNew = socialArticles.filter(a => !oldSocIds.has(a.id)).length;
    if (brandNew > 0) newSocialCount += brandNew;
  } else if (activeTab === "social") {
    newSocialCount = 0;
  }

  const alertCandidates = [
    ...articles.filter(a => !oldNewsIds.has(a.id) && shouldNotifyForItem(a)),
    ...socialArticles.filter(a => !oldSocIds.has(a.id) && shouldNotifyForItem(a))
  ].sort((a, b) => {
    const aDate = a.pubDate instanceof Date ? a.pubDate : new Date(a.pubDate || 0);
    const bDate = b.pubDate instanceof Date ? b.pubDate : new Date(b.pubDate || 0);
    return bDate - aDate;
  });

  sendDesktopNotifications(alertCandidates);
  prevArticleCount = articles.length;

  updateRefreshBtn();
  render();
  updateTabBadges();
  startAutoRefresh();
}

function startAutoRefresh() {
  if (autoRefreshId) clearInterval(autoRefreshId);
  if (countdownId)   clearInterval(countdownId);
  autoRefreshId = setInterval(() => { loadAllFeeds(); }, AUTO_REFRESH_MS);
  countdownId   = setInterval(() => { updateTimerDisplay(); }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById("autoRefreshStatus");
  if (!el || !lastUpdated) return;
  const elapsed = Date.now() - lastUpdated.getTime();
  const remaining = Math.max(0, AUTO_REFRESH_MS - elapsed);
  const secs = Math.ceil(remaining / 1000);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  const agoSecs = Math.floor(elapsed / 1000);
  let agoText;
  if (agoSecs < 5)       agoText = "just now";
  else if (agoSecs < 60) agoText = agoSecs + "s ago";
  else                    agoText = Math.floor(agoSecs / 60) + "m " + (agoSecs % 60) + "s ago";
  const pct = Math.min(100, (elapsed / AUTO_REFRESH_MS) * 100);
  el.innerHTML = `
    <div class="update-strip-head">
      <span class="update-strip-label">UPDATED ${agoText.toUpperCase()}</span>
      <span class="update-strip-timer">${m}:${s.toString().padStart(2,"0")}</span>
    </div>
    <div class="update-strip-bar">
      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#00ff88,#00ccff);border-radius:99px;transition:width .3s"></div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════ */
function timeAgo(date) {
  if (!date || isNaN(date.getTime()) || date.getTime() === 0) return "";
  const diff = Date.now() - date.getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return "just now"; if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  return Math.floor(h / 24) + "d ago";
}

function isBreaking(date) {
  if (!date || isNaN(date.getTime()) || date.getTime() === 0) return false;
  return (Date.now() - date.getTime()) < 3600000; // less than 1 hour
}

function esc(str) { const d = document.createElement("div"); d.textContent = str; return d.innerHTML; }

function decodeHtmlEntities(str = "") {
  const el = document.createElement("textarea");
  el.innerHTML = str;
  return el.value;
}

function detectPlatforms(headline = "") {
  const text = headline.toLowerCase();
  const normalized = text
    .replace(/[|/]/g, " ")
    .replace(/[-_]+/g, " ")
    .replace(/\s+/g, " ")
    .trim();

  const hasTerm = term => normalized.includes(term.toLowerCase());

  const matches = [];

  if (PLATFORM_FILTERS[0].keywords.some(hasTerm)) {
    matches.push(PLATFORM_FILTERS[0]);
  }

  if (
    hasTerm("ps5 pro") ||
    hasTerm("playstation 5 pro") ||
    (hasTerm("ps5") && hasTerm("pro")) ||
    (hasTerm("playstation 5") && hasTerm("pro"))
  ) {
    matches.push(PLATFORM_FILTERS[1]);
  }

  if (
    hasTerm("xbox series x") ||
    hasTerm("xbox series s") ||
    hasTerm("xbox series x s") ||
    hasTerm("xbox series x and s") ||
    hasTerm("series x") ||
    hasTerm("series s") ||
    hasTerm("xsx") ||
    hasTerm("xss") ||
    (hasTerm("xbox") && (hasTerm("series") || hasTerm("xsx") || hasTerm("xss")))
  ) {
    matches.push(PLATFORM_FILTERS[2]);
  }

  if (PLATFORM_FILTERS[3].keywords.some(hasTerm)) {
    matches.push(PLATFORM_FILTERS[3]);
  }

  if (
    hasTerm("nintendo switch 2") ||
    hasTerm("switch 2") ||
    hasTerm("switch successor") ||
    hasTerm("next gen switch") ||
    hasTerm("switch 2 edition")
  ) {
    matches.push(PLATFORM_FILTERS[4]);
  }

  return matches;
}

function articleMatchesPlatform(article, platformId) {
  if (platformId === "All") return true;
  return detectPlatforms(article.title).some(platform => platform.id === platformId);
}

function isDealItem(item) {
  return getDealSignal(item).isDeal;
}

function getDealSignal(item) {
  const text = `${item?.title || ""} ${item?.source || ""}`.trim();
  const sourceText = `${item?.source || ""} ${item?.handle || ""} ${item?.sourceId || ""}`.trim();
  const overrideMode = getDealSourceMode(item?.sourceId);
  if (!text) return { isDeal: false, confidence: "none", score: 0 };
  if (overrideMode === "off") return { isDeal: false, confidence: "none", score: 0 };
  if (DEAL_NEGATIVE_PATTERNS.some(pattern => pattern.test(text))) return { isDeal: false, confidence: "none", score: 0 };

  let score = 0;
  const hasStrong = DEAL_STRONG_PATTERNS.some(pattern => pattern.test(text));
  const hasSoft = DEAL_SOFT_PATTERNS.some(pattern => pattern.test(text));
  const hasPrice = DEAL_PRICE_PATTERNS.some(pattern => pattern.test(text));
  const hasRetailer = DEAL_RETAILER_PATTERNS.some(pattern => pattern.test(text));
  const hasCode = DEAL_CODE_PATTERNS.some(pattern => pattern.test(text));
  const isDealSource = overrideMode === "loose" || DEAL_SOURCE_PATTERNS.some(pattern => pattern.test(sourceText));
  const isLooseSource = overrideMode === "loose" || (overrideMode === "auto" && DEAL_LOOSE_SOURCE_PATTERNS.some(pattern => pattern.test(sourceText)));
  const isStrictSource = overrideMode === "strict" || (overrideMode === "auto" && DEAL_STRICT_SOURCE_PATTERNS.some(pattern => pattern.test(sourceText)));
  const hasCommerceSignal = hasPrice || hasRetailer || hasCode;

  if (hasStrong) score += 2;
  if (hasSoft) score += 1;
  if (hasPrice) score += 1.5;
  if (hasRetailer) score += 1;
  if (hasCode) score += 1;
  if (isDealSource) score += 0.5;

  // Broad personalities/news accounts need clearer commerce proof.
  if (isStrictSource) {
    if (!hasCommerceSignal && !hasStrong) return { isDeal: false, confidence: "none", score };
    return { isDeal: score >= 4, confidence: score >= 5 ? "strong" : "soft", score };
  }

  // Deal-centric accounts can trigger from terse price/store shorthand.
  if (isLooseSource) {
    if (hasCommerceSignal && (hasSoft || hasStrong || isDealSource)) {
      return { isDeal: true, confidence: hasStrong || hasCode || score >= 4 ? "strong" : "soft", score };
    }
    if (hasPrice && hasRetailer) {
      return { isDeal: true, confidence: hasCode ? "strong" : "soft", score };
    }
    return { isDeal: score >= 2.5, confidence: score >= 3.5 ? "strong" : "soft", score };
  }

  // For general sources, "sale" alone is too noisy without a commerce clue.
  if (hasSoft && !hasStrong && !hasCommerceSignal) return { isDeal: false, confidence: "none", score };

  return {
    isDeal: score >= 3,
    confidence: hasStrong || (hasPrice && (hasRetailer || hasCode)) || score >= 4 ? "strong" : "soft",
    score
  };
}

function scoreGamingRelevance(item) {
  const text = `${item?.title || ""} ${item?.source || ""} ${item?.handle || ""}`.toLowerCase();
  let score = 0;

  GAMING_RELEVANCE.strong.forEach(term => { if (text.includes(term)) score += 3; });
  GAMING_RELEVANCE.medium.forEach(term => { if (text.includes(term)) score += 2; });
  GAMING_RELEVANCE.entities.forEach(term => { if (text.includes(term)) score += 2; });
  PLATFORM_FILTERS.forEach(platform => {
    if (detectPlatforms(text).some(match => match.id === platform.id)) score += 2;
  });
  if (isDealItem(item)) score += 2;

  return score;
}

function isGamingRelevant(item) {
  return scoreGamingRelevance(item) >= 3;
}

function supportsNotifications() {
  return typeof window !== "undefined" && "Notification" in window;
}

async function requestNotificationPermission() {
  if (!supportsNotifications()) return "unsupported";
  if (Notification.permission === "granted" || Notification.permission === "denied") {
    return Notification.permission;
  }
  try {
    return await Notification.requestPermission();
  } catch {
    return "default";
  }
}

function setupNotificationPermissionPrompt() {
  if (notificationPermissionHooked || !supportsNotifications()) return;
  notificationPermissionHooked = true;

  const askOnce = async () => {
    await requestNotificationPermission();
    window.removeEventListener("pointerdown", askOnce);
    window.removeEventListener("keydown", askOnce);
    window.removeEventListener("touchstart", askOnce);
  };

  window.addEventListener("pointerdown", askOnce, { once: true });
  window.addEventListener("keydown", askOnce, { once: true });
  window.addEventListener("touchstart", askOnce, { once: true });
}

function shouldNotifyForItem(item) {
  const itemDate = item?.pubDate instanceof Date ? item.pubDate : new Date(item?.pubDate || 0);
  return isSourceNotificationsEnabled(item?.sourceId) && (isBreaking(itemDate) || isDealItem(item));
}

function getNotificationTypeLabel(item) {
  const itemDate = item?.pubDate instanceof Date ? item.pubDate : new Date(item?.pubDate || 0);
  const dealSignal = getDealSignal(item);
  if (dealSignal.isDeal && isBreaking(itemDate)) return dealSignal.confidence === "strong" ? "Breaking Deal" : "Breaking Deal Watch";
  if (dealSignal.isDeal) return dealSignal.confidence === "strong" ? "Deal Alert" : "Deal Watch";
  return "Breaking News";
}

function sendDesktopNotifications(items) {
  if (!supportsNotifications() || Notification.permission !== "granted") return;
  if (!document.hidden || !items.length) return;
  if (isQuietHour()) return;

  const now = Date.now();
  if ((now - lastNotificationAt) < NOTIFICATION_COOLDOWN_MS) return;
  lastNotificationAt = now;

  items.slice(0, 3).forEach(item => {
    const typeLabel = getNotificationTypeLabel(item);
    const body = `${item.source}${item.handle ? ` • @${item.handle}` : ""}\n${item.title}`;
    const notification = new Notification(`Game Pulse: ${typeLabel}`, {
      body,
      tag: `gamepulse-${item.id}`,
      renotify: false,
      silent: false
    });

    notification.onclick = () => {
      try { window.focus(); } catch {}
      try { window.open(item.link, "_blank", "noopener"); } catch {}
      notification.close();
    };

    setTimeout(() => notification.close(), 12000);
  });
}

  activeTab = tab;
  if (tab !== "feed") catchUpMode = false;
  if (tab === "feed") { newCount = 0; feedRenderLimit = INITIAL_RENDER_COUNT; scheduleVisitUpdate("feed"); }
  if (tab === "social") { newSocialCount = 0; socialRenderLimit = INITIAL_RENDER_COUNT; scheduleVisitUpdate("social"); }
  if (tab === "bookmarks") bookmarkRenderLimit = INITIAL_RENDER_COUNT;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));

  updateTabBadges();

  const el = document.getElementById("tabContent");

  else if (activeTab === "social")    el.innerHTML = renderSocial();
  else if (activeTab === "bookmarks") el.innerHTML = renderBookmarks();
  else                                 el.innerHTML = renderSources();

  updateTimerDisplay();

/* ── Link preview domain helper ── */
function extractDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ""); } catch { return ""; }

/* ── Top Stories clustering ── */
const STOP_WORDS = new Set([
  "the","a","an","is","in","for","and","to","of","on","with","from","at","by","it",
  "as","be","or","has","was","are","will","this","that","new","its","have","but",
  "after","over","more","than","into","about","also","could","would","their","they",
  "game","games","gaming" // too common in a gaming feed to be signal
]);
function extractKeywords(title) {
  return title.toLowerCase()
    .replace(/[^a-z0-9 ]/g, " ")
    .split(/\s+/)
    .filter(w => w.length > 2 && !STOP_WORDS.has(w));
}
function getTopStoryClusters(hoursWindow = 12) {
  const cutoff = Date.now() - hoursWindow * 60 * 60 * 1000;
  const recent = articles.filter(a => {
    const t = a.pubDate instanceof Date ? a.pubDate.getTime() : new Date(a.pubDate).getTime();
    return t >= cutoff;
  });
  if (recent.length < 3) return [];

  // Build keyword index
  const articleKeywords = recent.map(a => ({ a, kw: new Set(extractKeywords(a.title)) }));

  // Find clusters: groups of articles sharing 2+ keywords from different sources
  const clusters = [];
  const used = new Set();

  for (let i = 0; i < articleKeywords.length; i++) {
    if (used.has(i)) continue;
    const { a: seed, kw: seedKw } = articleKeywords[i];
    const cluster = [i];
    const sources = new Set([seed.source]);

    for (let j = i + 1; j < articleKeywords.length; j++) {
      if (used.has(j)) continue;
      const { a: cand, kw: candKw } = articleKeywords[j];
      if (sources.has(cand.source)) continue; // same source, skip
      let shared = 0;
      for (const w of seedKw) { if (candKw.has(w)) shared++; }
      if (shared >= 2) { cluster.push(j); sources.add(cand.source); }
    }

    if (sources.size >= 3) {
      cluster.forEach(idx => used.add(idx));
      // Pick most recent article as representative
      const members = cluster.map(idx => articleKeywords[idx].a);
      members.sort((x, y) => {
        const xt = x.pubDate instanceof Date ? x.pubDate.getTime() : new Date(x.pubDate).getTime();
        const yt = y.pubDate instanceof Date ? y.pubDate.getTime() : new Date(y.pubDate).getTime();
        return yt - xt;
      });
      clusters.push({ rep: members[0], sourceCount: sources.size });
    }
  }

  // Sort clusters by sourceCount desc, return top 3
  clusters.sort((a, b) => b.sourceCount - a.sourceCount);
  return clusters.slice(0, 3);
}
function renderTopStoryCard(cluster, i) {
  const { rep, sourceCount } = cluster;
  const ago = timeAgo(rep.pubDate instanceof Date ? rep.pubDate : new Date(rep.pubDate));
  const col = getColor(rep.sourceId);
  const delay = Math.min(i * 25, 200);
  return `<div class="fade-up" style="animation-delay:${delay}ms">
    <a href="${esc(rep.link)}" target="_blank" rel="noopener noreferrer" style="display:block" data-article-link-id="${esc(rep.id)}">
      <div class="top-story-card">
        <div class="card-meta">
          <span class="card-source" style="color:${col}">${esc(rep.source)}</span>
          ${ago ? `<span class="card-time">· ${ago}</span>` : ""}
          <span class="badge-coverage">+${sourceCount} sources</span>
        </div>
        <p class="news-title">${esc(rep.title)}</p>
      </div>
    </a>
  </div>`;
}
