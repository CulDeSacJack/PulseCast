<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0b0b12"/>
<title>GAME PULSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0b0b12;--surface:#13131d;--surface2:#1a1a27;--border:#222235;--text:#e6e6f0;--text2:#8888a0;--green:#00e87b;--cyan:#00c2ff;--red:#ff4757;--gold:#ffc940;--xblue:#1d9bf0}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}
a{color:inherit;text-decoration:none}
img{display:block}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.wrap{max-width:540px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{padding:20px 20px 0;flex-shrink:0}
.logo{font-size:28px;font-weight:800;letter-spacing:.06em;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{font-size:11px;color:var(--text2);letter-spacing:.14em;margin-top:2px;font-weight:600;text-transform:uppercase}
.nav{display:flex;gap:0;padding:16px 20px 0;flex-shrink:0;border-bottom:1px solid var(--border)}
.nav-btn{flex:1;background:none;border:none;padding:10px 0;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.04em}
.nav-btn.active{color:var(--green);border-bottom-color:var(--green)}
.nav-btn:hover{color:var(--text)}
.search-wrap{padding:12px 20px;flex-shrink:0}
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px}
.search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:'Outfit',sans-serif}
.search input::placeholder{color:var(--text2)}
.search-clear{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0;line-height:1;display:none}
.pills{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 14px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill.on{background:var(--green);border-color:var(--green);color:#080810}
.content{flex:1;overflow-y:auto;padding:0 20px 40px}
.section{display:none}.section.visible{display:block}
.status{display:flex;align-items:center;gap:6px;padding:4px 0 12px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1s infinite}
.status-text{font-size:11px;color:var(--text2);font-weight:500}
.card{display:flex;gap:12px;background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);transition:background .15s;cursor:pointer;animation:fadeIn .3s ease both}
.card:hover{background:var(--surface2)}
.card-body{flex:1;min-width:0}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.card-src{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.04em}
.card-time{font-size:11px;color:var(--text2)}
.badge-new{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--red);color:#fff;letter-spacing:.04em}
.card-title{font-size:14px;font-weight:500;line-height:1.45;color:var(--text)}
.card:hover .card-title{color:#fff}
.card-thumb{width:68px;height:68px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface2)}
.card-actions{margin-top:8px}
.save-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:11px;font-family:'Outfit',sans-serif;font-weight:600;display:flex;align-items:center;gap:4px;padding:0;transition:color .15s}
.save-btn:hover,.save-btn.on{color:var(--green)}
.skel{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px}
.x-cat-head{display:flex;align-items:center;gap:8px;padding:10px 0 8px;cursor:pointer;user-select:none}
.x-cat-label{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.1em;text-transform:uppercase}
.x-cat-count{font-size:10px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:99px}
.x-cat-chevron{margin-left:auto;color:var(--text2);font-size:14px;transition:transform .2s}
.x-cat-head.open .x-cat-chevron{transform:rotate(90deg)}
.x-cat-list{display:none}.x-cat-list.open{display:block}
.x-account{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:background .15s}
.x-account:hover{background:var(--surface2)}
.x-account.expanded{border-color:var(--xblue);background:var(--surface2)}
.x-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1d9bf022,#1d9bf011);border:1px solid #1d9bf033;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--xblue);font-weight:700;font-size:14px}
.x-info{flex:1;min-width:0}
.x-name{font-size:13px;font-weight:600;color:var(--text)}
.x-handle{font-size:11px;color:var(--xblue);font-family:'JetBrains Mono',monospace}
.x-embed-wrap{margin:0 0 6px;border-radius:10px;overflow:hidden;max-height:500px;overflow-y:auto}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;margin-bottom:4px}
.load-more{display:block;width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;text-align:center;margin-top:8px;transition:all .15s}
.load-more:hover{border-color:var(--green);color:var(--green)}
@media(max-width:400px){
  header{padding:16px 16px 0}.nav{padding:12px 16px 0}.search-wrap{padding:10px 16px}
  .pills{padding:0 16px 10px}.content{padding:0 16px 40px}.logo{font-size:24px}
  .card{padding:12px}.card-title{font-size:13px}.card-thumb{width:58px;height:58px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">GAME PULSE</div>
    <div class="tagline">Gaming News Feed</div>
  </header>
  <div class="nav">
    <button class="nav-btn active" data-nav="news" onclick="showSection('news')">News</button>
    <button class="nav-btn" data-nav="social" onclick="showSection('social')">X Posts</button>
    <button class="nav-btn" data-nav="saved" onclick="showSection('saved')">Saved</button>
  </div>
  <div class="search-wrap">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8888a0" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Search..."/>
      <button class="search-clear" id="clearSearch">×</button>
    </div>
  </div>
  <div id="pillsWrap" class="pills"></div>
  <div class="content" id="content">
    <div class="section visible" id="sec-news"></div>
    <div class="section" id="sec-social"></div>
    <div class="section" id="sec-saved"></div>
  </div>
</div>
<script async src="https://platform.twitter.com/widgets.js"></script>

let articles=[],activeSection="news",activeFilter="All",searchQuery="",bookmarks={},loadedCount=0,isLoading=false,expandedX=null,openCategories={},renderLimit=30;

function loadBookmarks(){try{const b=localStorage.getItem("gp2_bookmarks");if(b)bookmarks=JSON.parse(b)}catch{}}
function saveBookmarks(){try{localStorage.setItem("gp2_bookmarks",JSON.stringify(bookmarks))}catch{}}

function withTimeout(p,ms){return new Promise((res,rej)=>{const t=setTimeout(()=>rej("timeout"),ms);p.then(v=>{clearTimeout(t);res(v)},e=>{clearTimeout(t);rej(e)})})}

async function tryRss2Json(src){
  try{const r=await withTimeout(fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(src.rss)}`),10000);if(!r.ok)return null;const d=await r.json();if(d.status!=="ok"||!d.items?.length)return null;return d.items.map(i=>({id:i.link||i.guid||Math.random().toString(),title:(i.title||"").trim(),link:i.link||"",thumb:i.thumbnail||i.enclosure?.link||"",date:i.pubDate?new Date(i.pubDate):new Date(0),source:src.name,sourceId:src.id,color:src.color})).filter(a=>a.title&&a.link)}catch{return null}
}

async function tryProxy(src){
  const proxies=[
    {url:u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,parse:async r=>(await r.json()).contents},
    {url:u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,parse:r=>r.text()},
  ];
  for(const p of proxies){
    try{const r=await withTimeout(fetch(p.url(src.rss)),10000);if(!r.ok)continue;const xml=await p.parse(r);if(!xml||typeof xml!=="string")continue;const doc=new DOMParser().parseFromString(xml,"application/xml");if(doc.querySelector("parsererror"))continue;const items=[...doc.querySelectorAll("item,entry")];if(!items.length)continue;return items.map(el=>{const title=(el.querySelector("title")?.textContent||"").trim();const linkEl=el.querySelector("link");let link=linkEl?.getAttribute("href")||linkEl?.textContent?.trim()||el.querySelector("guid")?.textContent?.trim()||"";const rawDate=el.querySelector("pubDate")?.textContent||el.querySelector("published")?.textContent||el.querySelector("updated")?.textContent||"";let thumb="";const desc=el.querySelector("description")?.textContent||"";const m=desc.match(/<img[^>]+src=["']([^"']+)/i);if(m)thumb=m[1];return{id:link||Math.random().toString(),title,link,thumb,date:rawDate?new Date(rawDate):new Date(0),source:src.name,sourceId:src.id,color:src.color}}).filter(a=>a.title&&a.link)}catch{continue}
  }
  return null;
}

async function fetchAllFeeds(){
  isLoading=true;loadedCount=0;renderNews();
  const fresh=[];
  await Promise.allSettled(NEWS_SOURCES.map(async src=>{
    const items=await tryRss2Json(src)||await tryProxy(src);
    if(items)fresh.push(...items);loadedCount++;renderNews();
  }));
  const seen=new Set();
  articles=fresh.filter(a=>{if(seen.has(a.id))return false;seen.add(a.id);return true}).sort((a,b)=>b.date-a.date);
  isLoading=false;renderNews();
}

function timeAgo(d){if(!d||isNaN(d.getTime())||d.getTime()===0)return"";const diff=Date.now()-d.getTime(),m=Math.floor(diff/60000);if(m<1)return"just now";if(m<60)return m+"m ago";const h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago"}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

function renderPills(){
  const w=document.getElementById("pillsWrap");
  if(activeSection!=="news"){w.style.display="none";return}
  w.style.display="flex";
  w.innerHTML=["All",...NEWS_SOURCES.map(s=>s.name)].map(n=>`<button class="pill${activeFilter===n?" on":""}" onclick="setFilter('${esc(n)}')">${esc(n)}</button>`).join("");
}

function renderNews(){
  const el=document.getElementById("sec-news"),q=searchQuery.toLowerCase();
  const filtered=articles.filter(a=>activeFilter==="All"||a.source===activeFilter).filter(a=>!q||a.title.toLowerCase().includes(q)||a.source.toLowerCase().includes(q));
  if(isLoading&&articles.length===0){el.innerHTML=`<div class="status"><span class="status-dot"></span><span class="status-text">Loading ${loadedCount}/${NEWS_SOURCES.length} sources…</span></div>`+Array(5).fill(0).map(()=>`<div style="background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)"><div class="skel" style="height:12px;width:60px;margin-bottom:10px"></div><div class="skel" style="height:16px;width:95%;margin-bottom:6px"></div><div class="skel" style="height:16px;width:70%"></div></div>`).join("");return}
  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📡</div><div class="empty-title">${q?"No results":"No articles loaded"}</div></div>`;return}
  const vis=filtered.slice(0,renderLimit);
  let html=isLoading?`<div class="status"><span class="status-dot"></span><span class="status-text">Loading ${loadedCount}/${NEWS_SOURCES.length}…</span></div>`:"";
  vis.forEach((a,i)=>{const ago=timeAgo(a.date);const saved=!!bookmarks[a.id];const isNew=a.date&&(Date.now()-a.date.getTime())<3600000;const thumbHtml=a.thumb?`<img class="card-thumb" src="${esc(a.thumb)}" alt="" loading="lazy" onerror="this.style.display='none'"/>`:"";
    html+=`<a href="${esc(a.link)}" target="_blank" rel="noopener noreferrer" style="display:block"><div class="card" style="animation-delay:${Math.min(i*30,400)}ms"><div class="card-body"><div class="card-meta"><span class="card-src" style="color:${a.color}">${esc(a.source)}</span>${ago?`<span class="card-time">· ${ago}</span>`:""}${isNew?`<span class="badge-new">BREAKING</span>`:""}</div><div class="card-title">${esc(a.title)}</div><div class="card-actions"><button class="save-btn${saved?" on":""}" onclick="event.preventDefault();event.stopPropagation();toggleSave('${esc(a.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="${saved?"currentColor":"none"}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>${saved?"SAVED":"SAVE"}</button></div></div>${thumbHtml}</div></a>`});
  if(filtered.length>renderLimit)html+=`<button class="load-more" onclick="renderLimit+=30;renderNews()">Show more (${filtered.length-renderLimit} remaining)</button>`;
  el.innerHTML=html;
}

function renderSocial(){
  const el=document.getElementById("sec-social"),q=searchQuery.toLowerCase();let html="";
  Object.entries(X_ACCOUNTS).forEach(([cat,accounts])=>{
    const f=accounts.filter(a=>!q||a.name.toLowerCase().includes(q)||a.handle.toLowerCase().includes(q));if(!f.length)return;
    const isOpen=openCategories[cat]!==false;
    html+=`<div><div class="x-cat-head${isOpen?" open":""}" onclick="toggleCat('${esc(cat)}')"><span class="x-cat-label">${esc(cat)}</span><span class="x-cat-count">${f.length}</span><span class="x-cat-chevron">›</span></div><div class="x-cat-list${isOpen?" open":""}">`;
    f.forEach(a=>{const exp=expandedX===a.handle;
      html+=`<div class="x-account${exp?" expanded":""}" onclick="toggleX('${esc(a.handle)}')"><div class="x-avatar">${a.name[0]}</div><div class="x-info"><div class="x-name">${esc(a.name)}</div><div class="x-handle">@${esc(a.handle)}</div></div></div>`;
      if(exp)html+=`<div class="x-embed-wrap" id="embed-${esc(a.handle)}"><a class="twitter-timeline" data-theme="dark" data-chrome="noheader nofooter noborders transparent" data-height="400" href="https://twitter.com/${esc(a.handle)}">Loading @${esc(a.handle)}…</a></div>`;
    });
    html+=`</div></div>`;
  });
  if(!html)html=`<div class="empty"><div class="empty-icon">🐦</div><div class="empty-title">No accounts match</div></div>`;
  el.innerHTML=html;
  if(expandedX&&window.twttr?.widgets)setTimeout(()=>twttr.widgets.load(),100);
}

function renderSaved(){
  const el=document.getElementById("sec-saved"),q=searchQuery.toLowerCase();
  const saved=Object.values(bookmarks).sort((a,b)=>(b.savedAt||0)-(a.savedAt||0)).filter(a=>!q||a.title?.toLowerCase().includes(q)||a.source?.toLowerCase().includes(q));
  if(!saved.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📑</div><div class="empty-title">${q?"No match":"No saved articles yet"}</div><div style="font-size:12px;color:var(--text2)">Tap SAVE on any headline</div></div>`;return}
  el.innerHTML=`<div style="font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.1em;padding:4px 0 12px">${saved.length} SAVED</div>`+saved.map((a,i)=>`<a href="${esc(a.link)}" target="_blank" rel="noopener noreferrer" style="display:block"><div class="card" style="animation-delay:${Math.min(i*30,300)}ms"><div class="card-body"><div class="card-meta"><span class="card-src" style="color:${a.color||"var(--green)"}">${esc(a.source||"")}</span>${a.date?`<span class="card-time">· ${timeAgo(new Date(a.date))}</span>`:""}</div><div class="card-title">${esc(a.title)}</div><div class="card-actions"><button class="save-btn on" onclick="event.preventDefault();event.stopPropagation();toggleSave('${esc(a.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>REMOVE</button></div></div></div></a>`).join("");
}

function showSection(n){activeSection=n;searchQuery="";renderLimit=30;document.getElementById("searchInput").value="";document.getElementById("clearSearch").style.display="none";document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.nav===n));document.querySelectorAll(".section").forEach(s=>s.classList.remove("visible"));document.getElementById("sec-"+n).classList.add("visible");renderPills();if(n==="news")renderNews();else if(n==="social")renderSocial();else renderSaved()}
function setFilter(n){activeFilter=n;renderLimit=30;renderPills();renderNews()}
function toggleSave(id){if(bookmarks[id])delete bookmarks[id];else{const a=articles.find(x=>x.id===id);if(a)bookmarks[id]={...a,date:a.date?.toISOString?.(),savedAt:Date.now()}}saveBookmarks();if(activeSection==="news")renderNews();else renderSaved()}
function toggleCat(c){openCategories[c]=openCategories[c]===false?true:false;renderSocial()}
function toggleX(h){expandedX=expandedX===h?null:h;renderSocial()}

document.getElementById("searchInput").addEventListener("input",e=>{searchQuery=e.target.value;document.getElementById("clearSearch").style.display=searchQuery?"block":"none";renderLimit=30;if(activeSection==="news")renderNews();else if(activeSection==="social")renderSocial();else renderSaved()});
document.getElementById("clearSearch").addEventListener("click",()=>{searchQuery="";document.getElementById("searchInput").value="";document.getElementById("clearSearch").style.display="none";renderLimit=30;if(activeSection==="news")renderNews();else if(activeSection==="social")renderSocial();else renderSaved()});

loadBookmarks();renderPills();fetchAllFeeds();
setInterval(()=>fetchAllFeeds(),10*60*1000);
</script>
</body>
</html>
