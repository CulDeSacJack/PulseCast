            <svg width="13" height="13" viewBox="0 0 24 24" fill="${saved ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            ${saved ? "SAVED" : "SAVE"}
          </button>
        </div>
      </div>
    </a>
  </div>`;
}

/* ── Social / X Feed Tab ── */
function renderSocial() {
  const socialSources = getSocialSources();
  const q = socialSearchQ.toLowerCase();
  const scopedSocial = socialArticles
    .filter(a => !socialGamingOnly || isGamingRelevant(a));
  const filtered = scopedSocial
    .filter(a => socialFilter === "All" || a.source === socialFilter)
    .filter(a => !hideSocialRead || !isArticleRead(a.id))
    .filter(a => !q || a.title.toLowerCase().includes(q) || a.source.toLowerCase().includes(q));
  const unreadSocial = scopedSocial.filter(a => !isArticleRead(a.id));
  const visibleUnreadIds = filtered.filter(a => !isArticleRead(a.id)).map(a => a.id);

  const countBySource = {};
  unreadSocial.forEach(a => { countBySource[a.source] = (countBySource[a.source] || 0) + 1; });

  const pills = ["All", ...socialSources.map(s => s.name)];
  const pillsHtml = pills.map(p => {
    const src = socialSources.find(s => s.name === p);
    const col = src ? getColor(src.id) : "#0085ff";
    const active = socialFilter === p;
    const count = p === "All"
      ? unreadSocial.length
      : (countBySource[p] || 0);
    return `<button class="pill social-pill${active ? " active" : ""}" data-social-filter="${esc(p)}" style="--pill-col:${col};--pill-bg:${col}1f"><span>${esc(p)}</span>${count > 0 ? `<span class="pill-count">${count}</span>` : ""}</button>`;
  }).join("");

  const socialLoadedCount = socialSources.filter(s => loadedSources.has(s.id) || failedSources.has(s.id)).length;
  const socialLiveCount = socialSources.filter(s => loadedSources.has(s.id)).length;
  const socialFailedCount = socialSources.filter(s => failedSources.has(s.id)).length;
  const failedSocialNames = socialSources.filter(s => failedSources.has(s.id)).slice(0, 3).map(s => s.name);
  const showStatus = isLoading || socialLoadedCount < socialSources.length;
  const filteredOutCount = socialArticles.filter(a => !isGamingRelevant(a)).length;
  const unreadSummary = unreadSocial.length === 0
    ? (hideSocialRead ? "Unread only • all caught up" : "All caught up")
    : `${unreadSocial.length} unread${hideSocialRead ? " • unread only" : ""}`;
  const markVisibleDisabled = visibleUnreadIds.length === 0 ? "disabled" : "";
  const markVisibleLabel = visibleUnreadIds.length > 0 ? `MARK ${visibleUnreadIds.length} READ` : "ALL READ";
  const socialMetaHtml = `
    <div class="social-meta-bar">
      <div class="social-meta-copy">
        <div class="social-meta-title">GAMING ONLY</div>
        <div class="social-meta-sub">
          <span class="status-dot" style="background:${showStatus ? "#0085ff" : socialFailedCount ? "#ff5565" : "#0085ff"}"></span>
          <span>${socialGamingOnly ? `${filteredOutCount} hidden` : "All posts shown"} • ${showStatus ? `Loading ${socialLoadedCount}/${socialSources.length}` : `${socialLiveCount}/${socialSources.length} live${socialFailedCount ? ` • ${socialFailedCount} failed` : ""}`}</span>
        </div>
      </div>
      <button class="switch${socialGamingOnly ? " on" : ""}" id="socialGamingToggle" aria-pressed="${socialGamingOnly ? "true" : "false"}" aria-label="Toggle gaming-only social filtering">
        <span class="switch-knob"></span>
      </button>
    </div>`;
  const resilienceHtml = socialFailedCount
    ? `<div class="resilience-banner social">
        <div class="resilience-head">
          <div>
            <div class="resilience-title">SOCIAL RECOVERY AVAILABLE</div>
            <div class="resilience-copy">${socialFailedCount} Bluesky feed${socialFailedCount === 1 ? "" : "s"} failed${failedSocialNames.length ? `: ${esc(failedSocialNames.join(", "))}${socialFailedCount > failedSocialNames.length ? "…" : ""}` : ""}.</div>
          </div>
        </div>
        <div class="resilience-actions">
          <button class="banner-btn primary" data-inline-action="retry-failed">RETRY FAILED</button>
          <button class="banner-btn" data-inline-action="open-sources">OPEN SOURCES</button>
        </div>
      </div>`
    : "";
  let listHtml = "";
  if (isLoading && socialArticles.length === 0) {
    for (let i = 0; i < 4; i++) {
      listHtml += `<div class="skeleton-card" style="border-left-color:#0085ff33"><div style="display:flex;gap:8px;margin-bottom:10px;align-items:center"><div class="skel-line" style="height:10px;width:56px"></div><div class="skel-line" style="height:10px;width:36px"></div></div><div class="skel-line" style="height:15px;width:97%;margin-bottom:6px"></div><div class="skel-line" style="height:15px;width:60%"></div></div>`;
    }
  } else if (filtered.length === 0) {
    listHtml = `<div class="empty"><div class="empty-icon" style="font-size:38px">🦋</div><div class="empty-title">${socialSearchQ ? "No results found" : "No social posts loaded"}</div><div class="empty-sub">${socialSearchQ ? "Try a different search term" : "Bluesky feeds may need a moment to load — try refreshing"}</div></div>`;
  } else {
    const visible = filtered.slice(0, socialRenderLimit);
    visible.forEach((a, i) => { listHtml += renderTweetCard(a, i); });
    if (filtered.length > socialRenderLimit) {
      const remaining = filtered.length - socialRenderLimit;
      listHtml += `<div style="padding:10px 0 4px;text-align:center"><button id="socialLoadMoreBtn" style="display:inline-flex;align-items:center;justify-content:center;padding:9px 22px;border-radius:999px;border:1px solid var(--bg-muted);background:var(--bg-panel);color:var(--text-muted);font-size:11px;font-family:'Chakra Petch',sans-serif;letter-spacing:.07em;cursor:pointer;transition:all .15s">SHOW MORE (${remaining} remaining)</button></div>`;
    }
  }

  return `
    <div class="ptr-indicator" id="ptrIndicator"><div class="ptr-spinner" style="border-top-color:#0085ff"></div><span class="ptr-text">PULL TO REFRESH</span></div>
    <div class="feed-top">
      <div class="search-box" style="border-color:#0085ff22">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b6b85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search posts…" id="socialSearchInput" value="${esc(socialSearchQ)}"/>
        ${socialSearchQ ? '<button class="clear-btn" id="clearSocialSearch">×</button>' : ""}
      </div>
    </div>
    <div class="feed-toolbar">
      <span class="filter-summary">${unreadSummary}</span>
      <div class="toolbar-actions">
        <button class="compact-btn${compactMode ? " active" : ""}" id="compactModeToggleBtn">COMPACT</button>
        <button class="compact-btn${hideSocialRead ? " active" : ""}" id="hideSocialReadToggleBtn">${hideSocialRead ? "SHOW READ" : "HIDE READ"}</button>
        <button class="compact-btn" id="markVisibleSocialReadBtn" ${markVisibleDisabled}>${markVisibleLabel}</button>
      </div>
    </div>
    <div class="filter-row-head"><span class="filter-label">Sources</span></div>
    <div class="pills source-pills" id="socialPillsRow">${pillsHtml}</div>
    ${socialMetaHtml}
    ${resilienceHtml}
    <div class="article-list">
      ${listHtml}
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid #1c1c2c">
        <div style="font-size:10px;color:#6b6b85;font-family:'Chakra Petch',sans-serif;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:6px">
          <svg width="13" height="13" viewBox="0 0 568 501" fill="#6b6b85"><path d="M123.121 33.664C188.241 82.553 258.281 181.68 284 234.873c25.719-53.192 95.759-152.32 160.879-201.21C491.866-1.611 568-28.906 568 49.341c0 17.078-9.978 143.47-15.87 164.038C536.272 272.638 474.428 302.862 418.5 293.072c97.708 17.1 122.542 73.695 68.875 130.29C376.812 539.02 317.089 492.428 295.66 428.382c-2.458-7.34-3.615-10.755-3.768-7.856-.155-2.898-1.31.517-3.769 7.856C266.91 492.428 207.188 539.019 96.625 423.362 42.958 366.767 67.792 310.172 165.5 293.072c-55.928 9.79-117.772-20.434-133.63-79.693C25.978 192.81 16 66.42 16 49.34 16-28.906 92.134-1.61 123.121 33.664z"/></svg>
          BLUESKY ACCOUNTS
        </div>
        ${xAccounts.map((a, i) => `<div class="x-card fade-up" style="animation-delay:${i * 35}ms;margin-bottom:8px">
          <div class="x-avatar" style="width:34px;height:34px;font-size:14px;background:linear-gradient(135deg,#0085ff28,#0085ff12);border-color:#0085ff33;color:#0085ff">${esc(a.handle.split(".")[0][0].toUpperCase())}</div>
          <a href="https://bsky.app/profile/${esc(a.handle)}" target="_blank" rel="noopener noreferrer" class="x-info" style="flex:1;min-width:0">
            <div class="x-handle" style="font-size:13px">@${esc(a.handle)}</div>
            ${a.description ? `<div class="x-desc" style="font-size:11px">${esc(a.description)}</div>` : ""}
          </a>
          <button class="x-remove" data-handle="${esc(a.handle)}" title="Remove">×</button>
        </div>`).join("")}
        <div class="add-box" style="margin-top:8px">
          <div class="add-row">
            <div class="add-input" id="addInputWrap"><span>@</span><input id="xInput" placeholder="handle.bsky.social"/></div>
            <button class="add-btn" id="addXBtn">Add</button>
          </div>
          <div class="add-error" id="addError"></div>
        </div>
      </div>
    </div>`;
}

/* ── Catch Up mode rendering ── */
function renderCatchUp() {
  const clusters = getTopStoryClusters(48);
  let clustersHtml = "";
  if (clusters.length === 0) {
    clustersHtml = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-title">Not enough stories yet</div><div class="empty-sub">Check back after more news loads</div></div>`;
  } else {
    clusters.forEach((c, i) => { clustersHtml += renderTopStoryCard(c, i); });
  }
  return `
    <div style="padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div>
        <div style="font-size:12px;color:#ce93d8;font-family:'Chakra Petch',sans-serif;letter-spacing:.08em;margin-bottom:2px">CATCH UP MODE</div>
        <div style="font-size:11px;color:#6b6b85">Top stories from the last 48 hours</div>
      </div>
      <button id="catchUpExitBtn" style="padding:6px 14px;border-radius:999px;border:1px solid #1c1c2c;background:var(--bg-panel);color:#8b8ba3;font-size:10px;font-family:'Chakra Petch',sans-serif;letter-spacing:.06em;cursor:pointer">FULL FEED</button>
    </div>
    <div class="article-list" style="padding-top:4px">${clustersHtml}</div>`;
}

/* ── Feed Tab ── */
function renderFeed() {
  if (catchUpMode) return renderCatchUp();
  const q = searchQuery.toLowerCase();
  const filtered = articles
    .filter(a => activeFilter === "All" || a.source === activeFilter)
    .filter(a => articleMatchesPlatform(a, activePlatformFilter))
    .filter(a => !dealsOnly || isDealItem(a))
    .filter(a => !pinnedOnly || articleMatchesPinnedTopics(a))
    .filter(a => !hideRead || !isArticleRead(a.id))
    .filter(a => !q || a.title.toLowerCase().includes(q) || a.source.toLowerCase().includes(q));
  const unreadArticles = articles.filter(a => !isArticleRead(a.id));
  const visibleUnreadIds = filtered.filter(a => !isArticleRead(a.id)).map(a => a.id);

  // Count unread articles per source (ignoring search, so counts stay stable)
  const countBySource = {};
  unreadArticles.forEach(a => { countBySource[a.source] = (countBySource[a.source] || 0) + 1; });

  const pills = ["All", ...NEWS_SOURCES.map(s => s.name)];
  const pillsHtml = pills.map(p => {
    const src = SOURCES.find(s => s.name === p);
    const col = src ? getColor(src.id) : "#00ff88";
    const active = activeFilter === p;
    const count = p === "All" ? unreadArticles.length : (countBySource[p] || 0);
    return `<button class="pill source-pill${active ? " active" : ""}" data-filter="${esc(p)}" style="--pill-col:${col};--pill-bg:${col}1f"><span>${esc(p)}</span>${count > 0 ? `<span class="pill-count">${count}</span>` : ""}</button>`;
  }).join("");

  const dealsCount = unreadArticles.filter(a => isDealItem(a)).length;
  const dealsPillHtml = `<button class="pill source-pill${dealsOnly ? " active" : ""}" id="dealsPill" style="--pill-col:var(--accent-deal);--pill-bg:color-mix(in srgb, var(--accent-deal) 16%, transparent)"><span>💸 DEALS</span>${dealsCount > 0 ? `<span class="pill-count">${dealsCount}</span>` : ""}</button>`;
  const pinnedCount = pinnedTopics.length > 0 ? articles.filter(a => !isArticleRead(a.id) && articleMatchesPinnedTopics(a)).length : 0;
  const pinnedPillHtml = pinnedTopics.length > 0
    ? `<button class="pill source-pill${pinnedOnly ? " active" : ""}" id="pinnedPill" style="--pill-col:#ab47bc;--pill-bg:#ab47bc1f"><span>PINNED</span>${pinnedCount > 0 ? `<span class="pill-count">${pinnedCount}</span>` : ""}</button>`
    : "";

  const platformPills = ["All", ...PLATFORM_FILTERS.map(platform => platform.id)];
  const platformPillsHtml = platformPills.map(id => {
    const platform = PLATFORM_FILTERS.find(item => item.id === id);
    const col = platform ? platform.color : "#00ccff";
    const label = platform ? platform.label : "All Platforms";
    const active = activePlatformFilter === id;
    return `<button class="pill platform-pill${active ? " active" : ""}" data-platform-filter="${esc(id)}" style="--pill-col:${col};--pill-bg:${col}1f">${esc(label)}</button>`;
  }).join("");

  const newsLoadedCount = NEWS_SOURCES.filter(s => loadedSources.has(s.id) || failedSources.has(s.id)).length;
  const showStatus = isLoading || newsLoadedCount < NEWS_SOURCES.length;
  const failedNewsCount = NEWS_SOURCES.filter(s => failedSources.has(s.id)).length;
  const failedNewsNames = NEWS_SOURCES.filter(s => failedSources.has(s.id)).slice(0, 3).map(s => s.name);
  const statusHtml = showStatus ? `<div class="status-bar"><span class="status-dot"></span><span class="status-text">Loading ${newsLoadedCount}/${NEWS_SOURCES.length} sources…</span></div>` : "";
  const timerHtml = (!isLoading && lastUpdated) ? `<div class="update-strip" id="autoRefreshStatus"></div>` : "";
  const activePlatformNote = activePlatformFilter !== "All"
    ? `<div class="subtle-note"><strong>FILTER</strong> Showing only headlines matching ${esc(activePlatformFilter)}.</div>`
    : "";
  const unreadSummary = unreadArticles.length === 0
    ? (hideRead ? "Unread only • all caught up" : "All caught up")
    : `${unreadArticles.length} unread${hideRead ? " • unread only" : ""}`;
  const markVisibleDisabled = visibleUnreadIds.length === 0 ? "disabled" : "";
  const markVisibleLabel = visibleUnreadIds.length > 0 ? `MARK ${visibleUnreadIds.length} READ` : "ALL READ";
  const resilienceHtml = failedNewsCount
    ? `<div class="resilience-banner news">
        <div class="resilience-head">
          <div>
            <div class="resilience-title">SOME NEWS FEEDS MISSED THIS PASS</div>
            <div class="resilience-copy">${failedNewsCount} source${failedNewsCount === 1 ? "" : "s"} need a retry${failedNewsNames.length ? `: ${esc(failedNewsNames.join(", "))}${failedNewsCount > failedNewsNames.length ? "…" : ""}` : ""}.</div>
          </div>
        </div>
        <div class="resilience-actions">
          <button class="banner-btn primary" data-inline-action="retry-failed">RETRY FAILED</button>
          <button class="banner-btn" data-inline-action="open-sources">OPEN SOURCES</button>
        </div>
      </div>`
    : "";
  const guideHtml = helpPrefs.dismissed ? "" : `
    <div class="guide-panel">
      <div class="guide-head">
        <div>
          <div class="guide-title">QUICK START</div>
          <div class="guide-sub">Game Pulse works best like an inbox: unread counts shrink as you open or mark stories read.</div>
        </div>
        <button class="guide-dismiss" id="dismissGuideBtn">GOT IT</button>
      </div>
      <div class="guide-grid">
        <span class="guide-chip">Unread counts track what you’ve actually seen</span>
        <span class="guide-chip">COMPACT fits more stories on screen</span>
        <span class="guide-chip">Sources → SETTINGS controls color and deal strictness</span>
      </div>
    </div>`;

  // Top stories (only show on default view — no search/filter active)
  let topStoriesHtml = "";
  if (!isLoading && !searchQuery && activeFilter === "All" && activePlatformFilter === "All" && !dealsOnly) {
    const clusters = getTopStoryClusters();
    if (clusters.length) {
      topStoriesHtml = `<div class="top-stories-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6b6b85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        TOP STORIES
      </div>`;
      clusters.forEach((cluster, i) => { topStoriesHtml += renderTopStoryCard(cluster, i); });
      topStoriesHtml += `<div class="section-divider">ALL HEADLINES</div>`;
    }
  }

  let listHtml = "";
  if (isLoading && articles.length === 0) {
    for (let i = 0; i < 5; i++) {
      listHtml += `<div class="skeleton-card"><div style="display:flex;gap:8px;margin-bottom:10px;align-items:center"><div class="skel-line" style="height:10px;width:56px"></div><div class="skel-line" style="height:10px;width:36px"></div></div><div class="skel-line" style="height:15px;width:97%;margin-bottom:6px"></div><div class="skel-line" style="height:15px;width:78%"></div></div>`;
    }
  } else if (filtered.length === 0) {
    listHtml = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-title">${searchQuery ? "No results found" : "No articles loaded"}</div><div class="empty-sub">${searchQuery ? "Try a different search term" : "Hit Refresh to try again"}</div></div>`;
  } else {
    const visible = filtered.slice(0, feedRenderLimit);
    visible.forEach((a, i) => { listHtml += renderArticleCard(a, i, false); });
    if (filtered.length > feedRenderLimit) {
      const remaining = filtered.length - feedRenderLimit;
      listHtml += `<div style="padding:10px 0 4px;text-align:center"><button id="feedLoadMoreBtn" style="display:inline-flex;align-items:center;justify-content:center;padding:9px 22px;border-radius:999px;border:1px solid var(--bg-muted);background:var(--bg-panel);color:var(--text-muted);font-size:11px;font-family:'Chakra Petch',sans-serif;letter-spacing:.07em;cursor:pointer;transition:all .15s">SHOW MORE (${remaining} remaining)</button></div>`;
    }
  }

  return `
    <div class="ptr-indicator" id="ptrIndicator"><div class="ptr-spinner"></div><span class="ptr-text">PULL TO REFRESH</span></div>
    <div class="feed-top">
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b6b85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search headlines…" id="searchInput" value="${esc(searchQuery)}"/>
        ${searchQuery ? '<button class="clear-btn" id="clearSearch">×</button>' : ""}
      </div>
    </div>
    ${guideHtml}
    <div class="feed-toolbar">
      <span class="filter-summary">${unreadSummary}</span>
      <div class="toolbar-actions">
        ${(lastVisitedFeed > 0 && (Date.now() - lastVisitedFeed) > 4 * 60 * 60 * 1000 && !catchUpMode) ? `<button class="compact-btn" id="catchUpBtn" style="border-color:#ab47bc55;color:#ce93d8">CATCH UP</button>` : ""}
        <button class="compact-btn${compactMode ? " active" : ""}" id="compactModeToggleBtn">COMPACT</button>
        <button class="compact-btn${hideRead ? " active" : ""}" id="hideReadToggleBtn">${hideRead ? "SHOW READ" : "HIDE READ"}</button>
        <button class="compact-btn" id="markVisibleReadBtn" ${markVisibleDisabled}>${markVisibleLabel}</button>
      </div>
    </div>
    <div class="filter-row-head"><span class="filter-label">Sources</span></div>
    <div class="pills source-pills" id="pillsRow">${pillsHtml}${dealsPillHtml}${pinnedPillHtml}<button class="compact-btn${(showPlatformPills || activePlatformFilter !== "All") ? " active" : ""}" id="platformToggleBtn" style="flex-shrink:0">${activePlatformFilter !== "All" ? esc(activePlatformFilter) : "PLATFORMS"}</button></div>
    <div class="pills platform-pills" id="platformPillsRow" style="${(showPlatformPills || activePlatformFilter !== 'All') ? '' : 'display:none'}">${platformPillsHtml}</div>
    ${activePlatformNote}
    ${resilienceHtml}
    ${statusHtml}
    ${timerHtml}
    <div class="article-list">${topStoriesHtml}${listHtml}</div>`;
}

/* ── Bookmarks Tab ── */
function renderBookmarks() {
  const saved = Object.values(bookmarks).sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));

  if (saved.length === 0) {
    return `<div class="article-list" style="padding-top:16px"><div class="empty">
      <div class="empty-icon">📑</div>
      <div class="empty-title">No saved articles yet</div>
      <div class="empty-sub">Tap SAVE on any headline to bookmark it here</div>
    </div></div>`;
  }

  let html = "";
  const visibleSaved = saved.slice(0, bookmarkRenderLimit);
  visibleSaved.forEach((a, i) => {
    // Reconstruct Date if needed
    if (typeof a.pubDate === "string") a.pubDate = new Date(a.pubDate);
    html += a.sourceType === "social" ? renderTweetCard(a, i) : renderArticleCard(a, i, true);
  });
  if (saved.length > bookmarkRenderLimit) {
    const remaining = saved.length - bookmarkRenderLimit;
    html += `<div style="padding:10px 0 4px;text-align:center"><button id="bookmarkLoadMoreBtn" style="display:inline-flex;align-items:center;justify-content:center;padding:9px 22px;border-radius:999px;border:1px solid var(--bg-muted);background:var(--bg-panel);color:var(--text-muted);font-size:11px;font-family:'Chakra Petch',sans-serif;letter-spacing:.07em;cursor:pointer;transition:all .15s">SHOW MORE (${remaining} remaining)</button></div>`;
  }

  return `<div style="padding:12px 16px 4px;flex-shrink:0">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:10px;color:#6b6b85;font-family:'Chakra Petch',sans-serif;letter-spacing:.1em">${saved.length} SAVED ARTICLE${saved.length !== 1 ? "S" : ""}</span>
      <button id="clearAllBookmarks" style="background:none;border:1px solid #1c1c2c;border-radius:6px;padding:3px 10px;color:#6b6b85;font-size:10px;font-family:'Chakra Petch',sans-serif;cursor:pointer;letter-spacing:.06em;transition:color .15s,border-color .15s">CLEAR ALL</button>
    </div>
  </div>
  <div class="article-list" style="padding-top:8px">${html}</div>`;
}

/* ── Sources Tab ── */
function renderSourceCard(src, i) {
  const ok = loadedSources.has(src.id);
  const retrying = retryingSources.has(src.id);
  const failed = failedSources.has(src.id) && !retrying;
  const loading = retrying || (isLoading && !ok && !failed);
  const dotCol = ok ? "#00ff88" : retrying ? "#00ccff" : failed ? "#ff5565" : "#6b6b85";
  const label  = ok ? "LIVE" : retrying ? "RETRY" : failed ? "ERROR" : "…";
  const col = getColor(src.id);
  const isCustom = customColors[src.id] !== undefined;
  const paletteOpen = openPaletteId === src.id;
  const notifyEnabled = isSourceNotificationsEnabled(src.id);
  const dealMode = getDealSourceMode(src.id);
  const swatchesHtml = COLOR_PALETTE.map(c =>
    `<div class="swatch${c === col ? " active" : ""}" data-src="${src.id}" data-color="${c}" style="background:${c}" title="${c}"></div>`
  ).join("");
  const dealModeHtml = ["auto", "loose", "strict", "off"].map(mode =>
    `<button class="source-mode-btn${dealMode === mode ? " active" : ""}" data-deal-source="${src.id}" data-deal-mode="${mode}">${mode.toUpperCase()}</button>`
  ).join("");
  return `
    <div class="fade-up" style="animation-delay:${i * 35}ms;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <a href="${esc(src.site)}" target="_blank" rel="noopener noreferrer" style="display:block;flex:1;min-width:0">
          <div class="source-card" style="--src-col:${col};margin-bottom:0">
            <div style="flex:1;min-width:0"><div class="source-name">${esc(src.name)}${src.handle ? ` <span style="color:#6b6b85;font-size:11px;font-weight:400">@${esc(src.handle)}</span>` : ""}</div><div class="source-url">${esc(src.site)}</div></div>
            <div class="source-status"><span class="source-label" style="color:${dotCol}">${label}</span><div class="source-dot" style="background:${dotCol};${loading ? "animation:pulse 1s infinite" : ""}"></div></div>
          </div>
        </a>
        <div class="source-controls">
          <div class="source-tool-stack">
            <button class="notify-btn${notifyEnabled ? " enabled" : ""}" data-notify-toggle="${src.id}" title="${notifyEnabled ? "Notifications on" : "Notifications off"}" aria-label="${notifyEnabled ? `Disable notifications for ${src.name}` : `Enable notifications for ${src.name}`}">
              <svg viewBox="0 0 24 24">
                <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"/>
                <path d="M10 17a2 2 0 0 0 4 0"/>
                ${notifyEnabled ? "" : `<path d="M4 4l16 16"/>`}
              </svg>
            </button>
            <span class="source-tool-label">ALERTS</span>
          </div>
          <div class="source-tool-stack">
            <button class="color-btn" data-toggle="${src.id}" style="background:${col};border-color:${paletteOpen ? "#fff" : "#1c1c2c"}" title="Open source settings">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.8 1.2 2.1-.5.9 2 2 .9-.5 2.1L21 10.5l-1.2 1.8.5 2.1-2 .9-.9 2-2.1-.5L12 21l-1.8-1.2-2.1.5-.9-2-2-.9.5-2.1L3 13.5l1.2-1.8-.5-2.1 2-.9.9-2 2.1.5L12 3z"/><circle cx="12" cy="12" r="3.2"/></svg>
            </button>
            <span class="source-tool-label">SETTINGS</span>
          </div>
        </div>
      </div>
      <div class="color-palette${paletteOpen ? " open" : ""}" id="palette-${src.id}">
        <div class="source-mini-label">COLOR</div>
        ${swatchesHtml}
        ${isCustom ? `<button class="reset-color" data-reset="${src.id}">RESET</button>` : ""}
        <div class="source-mini-label">DEALS</div>
        <div class="source-mode-row">${dealModeHtml}</div>
      </div>
    </div>`;
}

function renderSources() {
  const allSources = getAllSources();
  const socialSources = getSocialSources();
  const newsLoaded   = NEWS_SOURCES.filter(s => loadedSources.has(s.id)).length;
  const socialLoaded = socialSources.filter(s => loadedSources.has(s.id)).length;
  const failedCount = failedSources.size;
  const retryingCount = retryingSources.size;
  const readCount = Object.keys(readArticles).length;
  const strictDealsCount = Object.values(dealSourcePrefs).filter(mode => mode === "strict").length;
  const heroHtml = `<div class="sources-hero">
    <div class="sources-hero-title">SOURCE CONTROL</div>
    <div class="sources-hero-copy">Tune notifications, colors, deal sensitivity, and recovery tools from one place. This is the control room for how Game Pulse feels day to day.</div>
    <div class="sources-hero-stats">
      <span class="hero-stat"><strong>${loadedSources.size}</strong> live feeds</span>
      <span class="hero-stat"><strong>${countEnabledNotificationSources()}</strong> alerts enabled</span>
      <span class="hero-stat"><strong>${strictDealsCount}</strong> strict deal sources</span>
    </div>
  </div>`;
  const settingsStatusHtml = settingsStatus?.at
    ? `<div class="settings-status"><strong>SETTINGS</strong> Last ${esc(settingsStatus.action || "updated")} ${esc(timeAgo(new Date(settingsStatus.at)) || "just now")}${settingsStatus.detail ? ` • ${esc(settingsStatus.detail)}` : ""}</div>`
    : "";
  const healthChips = [
    `<span class="health-chip"><strong>${loadedSources.size}</strong> live now</span>`,
    failedCount ? `<span class="health-chip danger"><strong>${failedCount}</strong> need attention</span>` : `<span class="health-chip"><strong>0</strong> failed feeds</span>`,
    retryingCount ? `<span class="health-chip warn"><strong>${retryingCount}</strong> retrying</span>` : `<span class="health-chip"><strong>${readCount}</strong> read items saved</span>`
  ].join("");

  let newsCardsHtml = "";
  NEWS_SOURCES.forEach((src, i) => { newsCardsHtml += renderSourceCard(src, i); });

  let socialCardsHtml = "";
  socialSources.forEach((src, i) => { socialCardsHtml += renderSourceCard(src, i + NEWS_SOURCES.length); });

  return `<div class="sources-tab">
    ${heroHtml}
    <div class="sources-count">${loadedSources.size} OF ${allSources.length} FEEDS ACTIVE</div>
    <div class="sources-toolbar">
      <div class="source-health">${healthChips}</div>
      <div class="source-actions">
        <button class="source-action-btn" id="exportSettingsBtn">EXPORT SETTINGS</button>
        <button class="source-action-btn" id="importSettingsBtn">IMPORT SETTINGS</button>
        <button class="source-action-btn warn" id="retryFailedBtn" ${failedCount === 0 || isLoading ? "disabled" : ""}>RETRY FAILED ONLY</button>
        <button class="source-action-btn danger" id="resetReadHistoryBtn" ${readCount === 0 ? "disabled" : ""}>RESET READ HISTORY</button>
      </div>
    </div>
    ${settingsStatusHtml}
    <input type="file" id="settingsImportInput" accept="application/json,.json" style="display:none" />
    <div class="toggle-row" style="margin:8px 0 8px">
      <div class="toggle-copy">
        <div class="toggle-title">QUIET HOURS</div>
        <div class="toggle-sub">${quietHours.enabled ? `Muting alerts ${quietHours.start}:00 – ${quietHours.end}:00` : "Notifications active around the clock"}</div>
      </div>
      <button class="switch${quietHours.enabled ? " on" : ""}" id="quietHoursToggle" aria-pressed="${quietHours.enabled}">
        <span class="switch-knob"></span>
      </button>
    </div>
    <div class="subtle-note" style="margin:0 0 14px"><strong>BELL ICON</strong> Gold means that source is allowed to trigger desktop alerts. Turning it off only silences notifications, not feed loading. <strong>SETTINGS</strong> opens color and deal-sensitivity controls for that source.</div>

    <div class="source-section-header" style="margin-top:16px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
      PINNED TOPICS
    </div>
    <div style="margin-bottom:10px">
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:10px">
        ${pinnedTopics.length ? pinnedTopics.map(kw => `<span class="pin-topic-tag" data-pin-remove="${esc(kw)}">${esc(kw)} <span class="pin-remove">×</span></span>`).join("") : `<span style="font-size:11px;color:#6b6b85;font-family:'Chakra Petch',sans-serif">No pinned topics yet</span>`}
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="pinTopicInput" type="text" placeholder="e.g. elden ring, xbox" style="flex:1;background:#111119;border:1px solid #1c1c2c;border-radius:8px;padding:7px 10px;color:#e8e8f0;font-size:12px;font-family:'DM Sans',sans-serif;outline:none"/>
        <button id="addPinTopicBtn" style="padding:7px 14px;border-radius:8px;border:1px solid #ab47bc44;background:#ab47bc12;color:#ce93d8;font-size:10px;font-family:'Chakra Petch',sans-serif;letter-spacing:.06em;cursor:pointer;white-space:nowrap">ADD TOPIC</button>
      </div>
    </div>

    <div class="source-section-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor" stroke="none"/></svg>
      NEWS SOURCES — ${newsLoaded}/${NEWS_SOURCES.length} LIVE
    </div>
    ${newsCardsHtml}

    <div class="source-section-header" style="margin-top:24px">
      <svg viewBox="0 0 568 501" fill="currentColor" style="width:14px;height:14px"><path d="M123.121 33.664C188.241 82.553 258.281 181.68 284 234.873c25.719-53.192 95.759-152.32 160.879-201.21C491.866-1.611 568-28.906 568 49.341c0 17.078-9.978 143.47-15.87 164.038C536.272 272.638 474.428 302.862 418.5 293.072c97.708 17.1 122.542 73.695 68.875 130.29C376.812 539.02 317.089 492.428 295.66 428.382c-2.458-7.34-3.615-10.755-3.768-7.856-.155-2.898-1.31.517-3.769 7.856C266.91 492.428 207.188 539.019 96.625 423.362 42.958 366.767 67.792 310.172 165.5 293.072c-55.928 9.79-117.772-20.434-133.63-79.693C25.978 192.81 16 66.42 16 49.34 16-28.906 92.134-1.61 123.121 33.664z"/></svg>
      BLUESKY SOURCES — ${socialLoaded}/${socialSources.length} LIVE
    </div>
    ${socialCardsHtml}

    <div class="about-feeds"><div class="about-title">ABOUT FEEDS</div><p class="about-text">News articles are fetched via RSS. Social posts are pulled from Bluesky's public feed endpoints. Some feeds may be temporarily blocked by CORS proxies or rate limits, so <strong>Retry Failed Only</strong> lets you recover just the broken ones without disturbing everything already loaded. Use the expanded source controls to make deal tagging <strong>LOOSE</strong>, <strong>STRICT</strong>, or <strong>OFF</strong> for individual feeds. <strong>Export Settings</strong> backs up your colors, source list, notifications, bookmarks, UI mode, and read state, while <strong>Reset Read History</strong> clears both Feed and Social unread tracking.</p></div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   EVENT LISTENERS
═══════════════════════════════════════════════════════════════ */
function attachEventListeners() {
  // Search
  const searchInput = document.getElementById("searchInput");
  if (searchInput) {
    searchInput.addEventListener("input", e => {
      searchQuery = e.target.value; render();
      const ni = document.getElementById("searchInput");
      if (ni) { ni.focus(); ni.selectionStart = ni.selectionEnd = ni.value.length; }
    });
  }
  const clearBtn = document.getElementById("clearSearch");
  if (clearBtn) clearBtn.addEventListener("click", () => { searchQuery = ""; render(); });
  const dismissGuideBtn = document.getElementById("dismissGuideBtn");
  if (dismissGuideBtn) {
    dismissGuideBtn.addEventListener("click", () => {
      helpPrefs.dismissed = true;
      saveHelpPrefs();
      render();
    });
  }

  // Social search
  const socialSearchInput = document.getElementById("socialSearchInput");
  if (socialSearchInput) {
    socialSearchInput.addEventListener("input", e => {
      socialSearchQ = e.target.value; render();
      const ni = document.getElementById("socialSearchInput");
      if (ni) { ni.focus(); ni.selectionStart = ni.selectionEnd = ni.value.length; }
    });
  }
  const clearSocialBtn = document.getElementById("clearSocialSearch");
  if (clearSocialBtn) clearSocialBtn.addEventListener("click", () => { socialSearchQ = ""; render(); });
  const socialGamingToggle = document.getElementById("socialGamingToggle");
  if (socialGamingToggle) {
    socialGamingToggle.addEventListener("click", () => {
      socialGamingOnly = !socialGamingOnly;
      saveSocialPrefs();
      render();
    });
  }
  const catchUpBtn = document.getElementById("catchUpBtn");
  if (catchUpBtn) catchUpBtn.addEventListener("click", () => { catchUpMode = true; render(); });
  const catchUpExitBtn = document.getElementById("catchUpExitBtn");
  if (catchUpExitBtn) catchUpExitBtn.addEventListener("click", () => { catchUpMode = false; render(); });

  const compactModeToggleBtn = document.getElementById("compactModeToggleBtn");
  if (compactModeToggleBtn) {
    compactModeToggleBtn.addEventListener("click", () => {
      compactMode = !compactMode;
      saveUiPrefs();
      render();
    });
  }
  const hideSocialReadToggleBtn = document.getElementById("hideSocialReadToggleBtn");
  if (hideSocialReadToggleBtn) {
    hideSocialReadToggleBtn.addEventListener("click", () => {
      hideSocialRead = !hideSocialRead;
      saveSocialPrefs();
      render();
    });
  }
  const markVisibleSocialReadBtn = document.getElementById("markVisibleSocialReadBtn");
  if (markVisibleSocialReadBtn) {
    markVisibleSocialReadBtn.addEventListener("click", () => {
      const q = socialSearchQ.toLowerCase();
      const visibleIds = socialArticles
        .filter(a => !socialGamingOnly || isGamingRelevant(a))
        .filter(a => socialFilter === "All" || a.source === socialFilter)
        .filter(a => !hideSocialRead || !isArticleRead(a.id))
        .filter(a => !q || a.title.toLowerCase().includes(q) || a.source.toLowerCase().includes(q))
        .filter(a => !isArticleRead(a.id))
        .map(a => a.id);
      if (markArticlesRead(visibleIds)) render();
    });
  }

  // Pills (news feed)
  document.querySelectorAll(".pill:not(.social-pill)").forEach(btn => {
    if (btn.dataset.filter) {
      btn.addEventListener("click", () => { activeFilter = btn.dataset.filter; dealsOnly = false; render(); });
    }
    if (btn.dataset.platformFilter) {
      btn.addEventListener("click", () => {
        activePlatformFilter = btn.dataset.platformFilter;
        if (activePlatformFilter === "All") { showPlatformPills = false; saveUiPrefs(); }
        render();
      });
    }
  });
  const platformToggleBtn = document.getElementById("platformToggleBtn");
  if (platformToggleBtn) {
    platformToggleBtn.addEventListener("click", () => {
      showPlatformPills = !showPlatformPills;
      saveUiPrefs();
      render();
    });
  }
  const dealsPill = document.getElementById("dealsPill");
  if (dealsPill) {
    dealsPill.addEventListener("click", () => {
      dealsOnly = !dealsOnly;
      if (dealsOnly) { activeFilter = "All"; pinnedOnly = false; }
      render();
    });
  }
  const pinnedPill = document.getElementById("pinnedPill");
  if (pinnedPill) {
    pinnedPill.addEventListener("click", () => {
      pinnedOnly = !pinnedOnly;
      if (pinnedOnly) { activeFilter = "All"; dealsOnly = false; }
      render();
    });
  }

  // Pinned topics management (Sources tab)
  const addPinTopicBtn = document.getElementById("addPinTopicBtn");
  const pinTopicInput = document.getElementById("pinTopicInput");
  if (addPinTopicBtn && pinTopicInput) {
    const doAddPin = () => {
      const kw = pinTopicInput.value.trim().toLowerCase();
      if (kw && !pinnedTopics.includes(kw)) {
        pinnedTopics.push(kw);
        savePinnedTopics();
        pinTopicInput.value = "";
        render();
      }
    };
    addPinTopicBtn.addEventListener("click", doAddPin);
    pinTopicInput.addEventListener("keydown", e => { if (e.key === "Enter") doAddPin(); });
  }
  document.querySelectorAll("[data-pin-remove]").forEach(el => {
    el.addEventListener("click", () => {
      const kw = el.dataset.pinRemove;
      pinnedTopics = pinnedTopics.filter(t => t !== kw);
      if (pinnedOnly && pinnedTopics.length === 0) pinnedOnly = false;
      savePinnedTopics();
      render();
    });
  });
  const hideReadToggleBtn = document.getElementById("hideReadToggleBtn");
  if (hideReadToggleBtn) {
    hideReadToggleBtn.addEventListener("click", () => {
      hideRead = !hideRead;
      saveFeedPrefs();
      render();
    });
  }

  // Social pills
  document.querySelectorAll(".social-pill").forEach(btn => btn.addEventListener("click", () => { socialFilter = btn.dataset.socialFilter; render(); }));

  // Article read actions
  document.querySelectorAll("[data-article-link-id]").forEach(link => {
    link.addEventListener("click", () => {
      const changed = markArticleReadById(link.dataset.articleLinkId);
      if (changed) setTimeout(() => render(), 0);
    });
  });
  document.querySelectorAll(".read-btn[data-read-id]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.preventDefault(); e.stopPropagation();
      if (markArticleReadById(btn.dataset.readId)) render();
    });
  });
  const markVisibleReadBtn = document.getElementById("markVisibleReadBtn");
  if (markVisibleReadBtn) {
    markVisibleReadBtn.addEventListener("click", () => {
      const q = searchQuery.toLowerCase();
      const visibleIds = articles
        .filter(a => activeFilter === "All" || a.source === activeFilter)
        .filter(a => articleMatchesPlatform(a, activePlatformFilter))
        .filter(a => !dealsOnly || isDealItem(a))
        .filter(a => !q || a.title.toLowerCase().includes(q) || a.source.toLowerCase().includes(q))
        .filter(a => !isArticleRead(a.id))
        .map(a => a.id);
      if (markArticlesRead(visibleIds)) render();
    });
  }

  // Bookmark buttons
  document.querySelectorAll(".bookmark-btn[data-bookmark-id]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.preventDefault(); e.stopPropagation();
      const id = btn.dataset.bookmarkId;
      // Find the article in articles, social articles, or bookmarks
      let article = articles.find(a => a.id === id) || socialArticles.find(a => a.id === id) || bookmarks[id];
      if (article) toggleBookmark(article);
    });
  });

  // Load More buttons (virtual list pagination)
  const feedLoadMoreBtn = document.getElementById("feedLoadMoreBtn");
  if (feedLoadMoreBtn) feedLoadMoreBtn.addEventListener("click", () => { feedRenderLimit += LOAD_MORE_COUNT; render(); });
  const socialLoadMoreBtn = document.getElementById("socialLoadMoreBtn");
  if (socialLoadMoreBtn) socialLoadMoreBtn.addEventListener("click", () => { socialRenderLimit += LOAD_MORE_COUNT; render(); });
  const bookmarkLoadMoreBtn = document.getElementById("bookmarkLoadMoreBtn");
  if (bookmarkLoadMoreBtn) bookmarkLoadMoreBtn.addEventListener("click", () => { bookmarkRenderLimit += LOAD_MORE_COUNT; render(); });

  // Clear all bookmarks
  const clearAll = document.getElementById("clearAllBookmarks");
  if (clearAll) clearAll.addEventListener("click", () => { bookmarks = {}; saveBookmarks(); render(); });

  // X account add
  const addBtn = document.getElementById("addXBtn");
  const xInput = document.getElementById("xInput");
  if (addBtn && xInput) {
    const doAdd = () => {
      const handle = resolveLegacyBlueskyHandle(xInput.value.trim().replace(/^@/, ""));
      const errEl = document.getElementById("addError");
      const wrapEl = document.getElementById("addInputWrap");
      const isValidBlueskyHandle = /^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$/i.test(handle);
      if (!handle) { errEl.textContent = "Please enter a Bluesky handle"; wrapEl.classList.add("err"); return; }
      if (!isValidBlueskyHandle) { errEl.textContent = "Use a full handle like cheapassgamer.com or name.bsky.social"; wrapEl.classList.add("err"); return; }
      if (removedDefaultXHandles.includes(handle)) {
        removedDefaultXHandles = removedDefaultXHandles.filter(item => item !== handle);
        xAccounts = normalizeXAccounts(xAccounts, removedDefaultXHandles);
        saveRemovedDefaultXHandles();
        saveXAccounts();
        render();
        return;
      }
      if (xAccounts.some(a => a.handle.toLowerCase() === handle.toLowerCase())) { errEl.textContent = "Already in your list!"; wrapEl.classList.add("err"); return; }
      xAccounts.push({ handle, description: "" }); saveXAccounts(); render();
    };
    addBtn.addEventListener("click", doAdd);
    xInput.addEventListener("keydown", e => { if (e.key === "Enter") doAdd(); });
    xInput.addEventListener("input", () => { document.getElementById("addError").textContent = ""; document.getElementById("addInputWrap").classList.remove("err"); });
  }

  // X account remove
  document.querySelectorAll(".x-remove").forEach(btn => btn.addEventListener("click", e => {
    e.stopPropagation();
    const handle = resolveLegacyBlueskyHandle(btn.dataset.handle || "");
    if (isBuiltInXHandle(handle)) {
      if (!removedDefaultXHandles.includes(handle)) removedDefaultXHandles.push(handle);
      saveRemovedDefaultXHandles();
    }
    xAccounts = xAccounts.filter(a => a.handle !== handle);
    const remainingSocialNames = new Set(getSocialSources().map(source => source.name));
    if (socialFilter !== "All" && !remainingSocialNames.has(socialFilter)) socialFilter = "All";
    saveXAccounts();
    render();
  }));

  const quietHoursToggle = document.getElementById("quietHoursToggle");
  if (quietHoursToggle) {
    quietHoursToggle.addEventListener("click", () => {
      quietHours = { ...quietHours, enabled: !quietHours.enabled };
      saveQuietHours();
      render();
    });
  }

  const exportSettingsBtn = document.getElementById("exportSettingsBtn");
  if (exportSettingsBtn) {
    exportSettingsBtn.addEventListener("click", () => {
      exportSettings();
    });
  }
  const importSettingsBtn = document.getElementById("importSettingsBtn");
  const settingsImportInput = document.getElementById("settingsImportInput");
  if (importSettingsBtn && settingsImportInput) {
    importSettingsBtn.addEventListener("click", () => {
      settingsImportInput.click();
    });
    settingsImportInput.addEventListener("change", async () => {
      const file = settingsImportInput.files?.[0];
      if (!file) return;
      try {
        await importSettingsFromFile(file);
        window.alert("Settings imported.");
      } catch (err) {
        window.alert(err?.message || "Could not import settings.");
      } finally {
        settingsImportInput.value = "";
      }
    });
  }
  const retryFailedBtn = document.getElementById("retryFailedBtn");
  if (retryFailedBtn) {
    retryFailedBtn.addEventListener("click", () => {
      retryFailedFeeds();
    });
  }
  document.querySelectorAll("[data-inline-action]").forEach(btn => btn.addEventListener("click", () => {
    const action = btn.dataset.inlineAction;
    if (action === "retry-failed") retryFailedFeeds();
    if (action === "open-sources") switchTab("sources");
  }));
  const resetReadHistoryBtn = document.getElementById("resetReadHistoryBtn");
  if (resetReadHistoryBtn) {
    resetReadHistoryBtn.addEventListener("click", () => {
      if (!Object.keys(readArticles).length) return;
      if (window.confirm("Clear read history for both Feed and Social?")) {
        clearReadHistory();
        render();
      }
    });
  }

  // Color picker
  document.querySelectorAll(".notify-btn[data-notify-toggle]").forEach(btn => btn.addEventListener("click", async e => {
    e.preventDefault();
    e.stopPropagation();
    const sourceId = btn.dataset.notifyToggle;
    const nextEnabled = !isSourceNotificationsEnabled(sourceId);
    notificationPrefs[sourceId] = nextEnabled;
    saveNotificationPrefs();
    if (nextEnabled) await requestNotificationPermission();
    render();
  }));
  document.querySelectorAll(".color-btn[data-toggle]").forEach(btn => btn.addEventListener("click", e => { e.preventDefault(); e.stopPropagation(); openPaletteId = openPaletteId === btn.dataset.toggle ? null : btn.dataset.toggle; render(); }));
  document.querySelectorAll(".swatch[data-src]").forEach(sw => sw.addEventListener("click", e => { e.stopPropagation(); customColors[sw.dataset.src] = sw.dataset.color; saveCustomColors(); openPaletteId = null; render(); }));
  document.querySelectorAll(".reset-color[data-reset]").forEach(btn => btn.addEventListener("click", e => { e.stopPropagation(); delete customColors[btn.dataset.reset]; saveCustomColors(); openPaletteId = null; render(); }));
  document.querySelectorAll(".source-mode-btn[data-deal-source][data-deal-mode]").forEach(btn => btn.addEventListener("click", e => {
    e.preventDefault();
    e.stopPropagation();
    const sourceId = btn.dataset.dealSource;
    const mode = btn.dataset.dealMode;
    if (!sourceId || !mode) return;
    if (mode === "auto") delete dealSourcePrefs[sourceId];
    else dealSourcePrefs[sourceId] = mode;
    saveDealSourcePrefs();
    render();
  }));
}

/* ═══════════════════════════════════════════════════════════════
   PULL-TO-REFRESH (touch gesture)
═══════════════════════════════════════════════════════════════ */
let ptrStartY    = 0;
let ptrDragging   = false;
const PTR_THRESHOLD = 70;  // pixels to pull before triggering refresh

function setupPullToRefresh() {
  const content = document.getElementById("tabContent");
  if (!content) return;

  content.addEventListener("touchstart", e => {
    // Only start if scrolled to the top of the article list
    const list = content.querySelector(".article-list, .sources-tab, .x-list");
    if (list && list.scrollTop > 0) return;
    ptrStartY = e.touches[0].clientY;
    ptrDragging = true;
  }, { passive: true });

  content.addEventListener("touchmove", e => {
    if (!ptrDragging) return;
    const dy = e.touches[0].clientY - ptrStartY;
    if (dy < 0) { ptrDragging = false; return; }
    const indicator = document.getElementById("ptrIndicator");
    if (!indicator) return;
    const h = Math.min(dy * 0.5, 60);
    indicator.style.height = h + "px";
    const spinner = indicator.querySelector(".ptr-spinner");
    const text = indicator.querySelector(".ptr-text");
    if (h >= PTR_THRESHOLD * 0.5) {
      if (spinner) spinner.style.transform = `rotate(${dy * 2}deg)`;
      if (text) text.textContent = h >= 55 ? "RELEASE TO REFRESH" : "PULL TO REFRESH";
    }
  }, { passive: true });

  content.addEventListener("touchend", () => {
    if (!ptrDragging) return;
    ptrDragging = false;
    const indicator = document.getElementById("ptrIndicator");
    if (!indicator) return;
    const h = parseFloat(indicator.style.height) || 0;
    if (h >= 55 && !isLoading) {
      // Trigger refresh with animation
      indicator.style.height = "40px";
      const spinner = indicator.querySelector(".ptr-spinner");
      if (spinner) { spinner.style.transform = ""; spinner.classList.add("spinning"); }
      const text = indicator.querySelector(".ptr-text");
      if (text) text.textContent = "REFRESHING…";
      try { if (navigator.vibrate) navigator.vibrate(30); } catch {}
      loadAllFeeds().then(() => {
        if (indicator) indicator.style.height = "0px";
        if (spinner) spinner.classList.remove("spinning");
      });
    } else {
      indicator.style.height = "0px";
    }
  }, { passive: true });
}

/* ═══════════════════════════════════════════════════════════════
   SCROLL-TO-TOP BUTTON
═══════════════════════════════════════════════════════════════ */
function scrollToTop() {
  const list = document.querySelector(".article-list, .sources-tab, .x-list, .x-tab");
  if (list) list.scrollTo({ top: 0, behavior: "smooth" });
}

let scrollThrottleTimer = null;
function setupScrollWatcher() {
  // Watch for scroll on any scrollable area inside tab content
  const content = document.getElementById("tabContent");
  if (!content) return;
  content.addEventListener("scroll", handleScroll, true); // use capture to catch child scrolls
}

function handleScroll(e) {
  if (scrollThrottleTimer) return;
  scrollThrottleTimer = setTimeout(() => {
    scrollThrottleTimer = null;
    const btn = document.getElementById("scrollTopBtn");
    if (!btn) return;
    const scrolled = e.target.scrollTop > 300;
    btn.classList.toggle("visible", scrolled);
  }, 100);
}

   INIT
═══════════════════════════════════════════════════════════════ */
// Init — load all saved data (async-safe), then render and fetch feeds
(async function init() {
  await loadRemovedDefaultXHandles();
  await loadXAccounts();
  await loadCustomColorsAsync();
  await loadNotificationPrefs();
  await loadDealSourcePrefs();
  await loadSettingsStatus();
  await loadHelpPrefs();
  await loadUiPrefs();
  await loadQuietHours();
  await loadPinnedTopics();
  await loadFeedPrefs();
  await loadSocialPrefs();
  await loadBookmarks();
  await loadReadArticles();
  await loadLastVisited();
  setupNotificationPermissionPrompt();
  render();
  setupPullToRefresh();
  setupScrollWatcher();
  loadAllFeeds();
})();
</script>
